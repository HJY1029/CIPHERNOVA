# 豆包 · DES-ECB 失败驱动补充（与 test_data 对齐）
supplement: |
  **（编译零分）禁止输出与评测日志相同的行，例如：** `#define 8 8 // 8字节(64位)块大小` **或** `#define 8 8 /* DES块大小为8字节(64位) */` **（必报 `macro names must be identifiers`；块注释不能救宏名）。** 块长只允许 **`#define DES_BLOCK_BYTES 8`** 或 **`enum { DES_BLK = 8 };`**，说明单独一行 **`/* DES 块 8 字节 */`**。
  DES-ECB：明文 **16 字节（32 hex）**、密钥 **8 字节（16 hex）**，无 IV；**无填充**（两整块 8+8）。密文 **32 hex**。
  **自测 golden（整行，禁止改任一字符）：** **`958920B1358EF1972B9EE4548DC08E8A`**。可拆成两段自检：**前 16 hex = `958920B1358EF197`**，**后 16 hex 必须恰好 = `2B9EE4548DC08E8A`**（**不是** `827883787EF3DB3B` 等）。
  **第二块高频错：** 若输出形如 **`958920…` + `82788378…`**，多为 **第二块明文未取字节 8–15**、**重复加密第一块**、或 **误用 CBC/链值**。ECB 下 **`C2 = E_K(P2)`**，**`P2` = 明文第 9–16 字节 `5365637572697479`**，**与 `C1` 无关**。

c: |
  **禁止（含 `//` 与 `/* */` 两种注释）：** `#define 8 8 // 8字节(64位)块大小`、`#define 8 8 /* DES块大小为8字节(64位) */`、`#define 8 8 // 64位块` —— **任何**「`#define` + 数字宏名」；**只允许** **`#define DES_BLOCK_BYTES 8`** 或 **`enum { DES_BLK = 8 };`**，说明**另起一行** **`/* DES 块 8 字节 */`**。
  **EVP 路径：** `EVP_des_ecb()` + legacy + **`EVP_CIPHER_CTX_set_padding(ctx,0)`**；推荐 **一次** `EVP_EncryptUpdate(ctx, out, &len, plaintext, **16**)` 处理**完整 16 字节明文**，再按 **`ciphertext_len`** 打印 **32 hex**，与 golden **逐字符**一致。
  手搓 DES 时须对 **i=0,8** 各做一轮 **`C[i..i+7] = E_K(P[i..i+7])`**，**禁止**第二块输入误用密文或 IV。
  **S 盒等表：** 元素均为 **int**，**禁止** `"3"`、`"6"` 等字符串。
