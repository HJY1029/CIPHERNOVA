{% extends "base.html" %}

{% block title %}安全扫描 - 织密新星 (CipherNova){% endblock %}

{% block content %}
<div class="container">
    <div class="header">
        <h1>🔒 安全扫描</h1>
        <p>扫描代码中的安全漏洞和潜在风险</p>
    </div>
    <div class="content">
        <div id="status" class="status"></div>
        
        <div class="form-group">
            <label>代码（从首页生成代码后，粘贴到这里）</label>
            <textarea id="codeInput" class="form-control" rows="15" placeholder="请粘贴要扫描的代码..."></textarea>
        </div>
        <div class="form-group">
            <label>编程语言</label>
            <select id="language" class="form-control">
                <option value="python">Python</option>
                <option value="c">C</option>
                <option value="cpp">C++</option>
            </select>
        </div>
        <button type="button" class="btn" onclick="scanSecurity()">开始扫描</button>
        <div id="securityResult" style="margin-top: 20px; display: none;"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    async function scanSecurity() {
        const code = document.getElementById('codeInput').value.trim();
        if (!code) {
            showStatus('请先输入代码', 'error');
            return;
        }
        
        const language = document.getElementById('language').value;
        const resultDiv = document.getElementById('securityResult');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '<div class="status info">正在扫描安全漏洞...</div>';
        
        try {
            const response = await fetch('/api/security-scan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    code: code,
                    language: language
                })
            });
            
            const data = await response.json();
            if (data.success) {
                if (data.issues.length === 0) {
                    resultDiv.innerHTML = '<div class="status success">✓ 未发现安全问题</div>';
                } else {
                    resultDiv.innerHTML = `
                        <h4>安全扫描结果</h4>
                        ${data.issues.map(issue => `
                            <div style="padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 4px solid; 
                                ${issue.severity === 'critical' ? 'background: #fff3cd; border-color: #ffc107;' : 
                                  issue.severity === 'warning' ? 'background: #d1ecf1; border-color: #17a2b8;' : 
                                  'background: #e7f3ff; border-color: #0066aa;'}">
                                <strong>${issue.severity === 'critical' ? '🔴 严重' : issue.severity === 'warning' ? '🟡 警告' : '🔵 信息'}</strong>
                                <p style="margin: 5px 0;">${escapeHtml(issue.message)}</p>
                                ${issue.suggestion ? `<p style="margin: 5px 0; font-size: 0.9em; color: #666;">建议: ${escapeHtml(issue.suggestion)}</p>` : ''}
                            </div>
                        `).join('')}
                    `;
                }
            } else {
                resultDiv.innerHTML = `<div class="status error">扫描失败: ${data.error}</div>`;
            }
        } catch (error) {
            resultDiv.innerHTML = `<div class="status error">扫描失败: ${error.message}</div>`;
        }
    }
</script>
{% endblock %}
