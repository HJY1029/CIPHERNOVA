# AES-CFB模式的C++语言特定内容
cpp_specific: |
  **🚨🚨🚨 绝对重要：必须使用CFB-8模式，不是CFB-128模式！🚨🚨🚨**
  **标准测试数据使用CFB-8模式（每次处理1字节），必须使用 `EVP_aes_128_cfb8()`、`EVP_aes_192_cfb8()` 或 `EVP_aes_256_cfb8()`！**
  **绝对禁止使用 `EVP_aes_128_cfb128()`、`EVP_aes_192_cfb128()` 或 `EVP_aes_256_cfb128()`！这些函数是CFB-128模式，与测试数据不匹配！**
  
  **使用OpenSSL库的实现要求（C++语言）：**
  1. **必须包含头文件：**
     - `#include <openssl/evp.h>`
     - `#include <cstdlib>`
     - `#include <iostream>`
     - `#include <string>`
     - `#include <iomanip>`
  
  2. **必须使用OpenSSL EVP函数：**
     - ✅ **正确：使用 `EVP_aes_128_cfb8()`、`EVP_aes_192_cfb8()` 或 `EVP_aes_256_cfb8()`（标准测试数据使用CFB-8模式，根据密钥长度选择）**
     - ❌ **错误：绝对禁止使用 `EVP_aes_128_cfb128()`、`EVP_aes_192_cfb128()` 或 `EVP_aes_256_cfb128()`（这是CFB-128模式，与测试数据不匹配，会导致测试失败！）**
     - ✅ **正确：使用 `EVP_EncryptInit_ex()`、`EVP_EncryptUpdate()`、`EVP_EncryptFinal_ex()`**
     - ✅ **正确：使用 `EVP_CIPHER_CTX_new()` 和 `EVP_CIPHER_CTX_free()`**
     - 🚨🚨🚨 **重要：标准测试数据使用CFB-8模式（每次处理1字节），必须使用 `EVP_aes_*_cfb8()` 函数！**
  
  3. **正确的代码示例（必须严格遵循）：**
     ```cpp
     // 根据密钥长度选择正确的CFB-8函数
     if (key_len == 16) {
         EVP_EncryptInit_ex(ctx, EVP_aes_128_cfb8(), nullptr, key, iv);  // ✅ 正确：使用cfb8
     } else if (key_len == 24) {
         EVP_EncryptInit_ex(ctx, EVP_aes_192_cfb8(), nullptr, key, iv);  // ✅ 正确：使用cfb8
     } else if (key_len == 32) {
         EVP_EncryptInit_ex(ctx, EVP_aes_256_cfb8(), nullptr, key, iv);  // ✅ 正确：使用cfb8
     }
     ```
  
  4. **错误的代码示例（绝对禁止）：**
     ```cpp
     // ❌ 错误：绝对禁止使用cfb128！
     if (key_len == 16) {
         EVP_EncryptInit_ex(ctx, EVP_aes_128_cfb128(), nullptr, key, iv);  // ❌ 错误：这是CFB-128模式，与测试数据不匹配！
     }
     ```
  
  3. **main函数必须完整实现：**
     - 从环境变量读取明文、密钥和IV（TEST_PLAINTEXT, TEST_KEY, TEST_IV）
     - 将十六进制字符串转换为字节数组
     - 如果TEST_IV不存在，使用全零IV（16字节）
     - 根据密钥长度选择正确的EVP函数（128位、192位或256位）
     - 使用OpenSSL EVP函数进行CFB模式加密
     - 输出密文（十六进制格式，不包含IV）
     - 释放资源并返回0
  
  **关键实现细节（C++语言）：**
  - **密钥长度检测：**根据密钥字节长度选择对应的EVP函数
    - 16字节（128位）→ `EVP_aes_128_cfb8()`（🚨🚨🚨 必须使用cfb8，不是cfb128！）
    - 24字节（192位）→ `EVP_aes_192_cfb8()`（🚨🚨🚨 必须使用cfb8，不是cfb128！）
    - 32字节（256位）→ `EVP_aes_256_cfb8()`（🚨🚨🚨 必须使用cfb8，不是cfb128！）
  - **IV处理：**IV必须为16字节，从环境变量TEST_IV读取，如果不存在则使用全零
  - **🚨🚨🚨 CFB模式：标准测试数据使用CFB-8模式（每次处理1字节），必须使用 `EVP_aes_*_cfb8()` 函数，不要使用 `EVP_aes_*_cfb128()`！**
  - **🚨🚨🚨 输出长度控制（绝对重要！）：**必须只输出实际加密的数据长度，不要输出整个缓冲区或IV！
    - ✅ **正确做法（C++）：**
      ```cpp
      int len;
      int ciphertext_len = 0;
      unsigned char ciphertext[plaintext_len];
      
      EVP_EncryptUpdate(ctx, ciphertext, &len, plaintext, plaintext_len);
      ciphertext_len = len;
      EVP_EncryptFinal_ex(ctx, ciphertext + len, &len);
      ciphertext_len += len;  // 总长度 = Update长度 + Final长度
      
      // 只输出 ciphertext_len 长度的数据，不要输出IV！
      std::cout << "密文: ";
      for (int i = 0; i < ciphertext_len; i++) {  // 使用 ciphertext_len！
          std::cout << std::hex << std::setfill('0') << std::setw(2) << static_cast<int>(ciphertext[i]);
      }
      std::cout << std::endl;
      ```
    - ❌ **错误做法（绝对禁止）：**
      - 输出整个缓冲区（`sizeof(ciphertext)` 或 `ciphertext.size()`）
      - 输出IV（IV只用于加密过程，不应该出现在输出中）
      - 输出额外的填充空间
      - 使用范围for循环（`for (auto c : ciphertext)`）
      - 使用vector.size()或vector.capacity()
    - **关键：`ciphertext_len` 是 `EVP_EncryptUpdate()` 和 `EVP_EncryptFinal_ex()` 返回的长度之和，这是实际加密的数据长度！**

