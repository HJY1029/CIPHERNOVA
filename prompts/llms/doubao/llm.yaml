# 豆包（Doubao）特定prompt配置
# 使用完整版prompt（full），因为豆包支持更大的上下文

llm_specific:
  compact: false  # 豆包使用完整版prompt

  # 批量评测高频错误（#define 8、三元缺 ?、GCM 缺 tag、栈溢出、数组里 a34 等）
  coder_bootstrap: |
    **【豆包 · 对称加密代码生成 · 批量评测必守】**
    - **（C）硬禁令 — 下列整行若出现在源码中 = 必编译失败（豆包实测），禁止生成：**  
      `#define 8 8 // 8字节(64位)块大小` · `#define 8 8 /* DES块大小为8字节(64位) */` · `#define 8 8 // 64位块` · 任意 **`#define <数字>`** 或 **`#define <数字> <数字>`**（**`/* */` 或 `//` 写在同一行也不能让数字变成合法宏名**）。  
      **唯一允许的块长写法示例：** `#define DES_BLOCK_BYTES 8`（DES）或 `#define SM4_BLOCK_BYTES 16`（SM4）；说明用 **`/* … */` 独占一行**，**禁止**与 `#define 8` 拼在同一行。
    - **（C）`tau`/字分解：** **禁止** `uint8_t a, 0x0B, 0x0C, d; // 修正变量声明错误` ——gcc 报 **`expected identifier or '(' before numeric constant`**，且 **`b`/`c` undeclared**（`0x0B`/`0x0C` 是常量不是变量名）。**合法最小例：** `uint8_t a=(uint8_t)(x>>24), b=(uint8_t)(x>>16), c=(uint8_t)(x>>8), d=(uint8_t)x;` 或先声明 `uint8_t a,b,c,d;` 再四行赋值。**SM4-CFB 优先只写 `EVP_sm4_cfb128`，不要手写 `tau` 除非已自检声明语法。**
    - **（C/C++）第一优先级：** 源码里**禁止**出现 **`#define 8`**、**`#define 8 8`**、**`#define 8 8 // …`**、**`#define 8 8 /* … */`**——一律编译失败。块长只写 **`#define DES_BLOCK_BYTES 8`** 或 **`#define SM4_BLOCK_BYTES 16`**。
    - **DES-ECB（C）：** 32 hex 密文**后 16 字符**必须是 **`2B9EE4548DC08E8A`**（与前 16 字符 `958920B1358EF197` 拼接成标准向量）；若后段变成 **`82788378…`** 等，第二块 **`E(K,P2)`** 必错。
    - **任务级补充：** 本仓库为豆包在 `prompts/llms/doubao/algorithms/<算法-模式>.yaml` 中提供**自测 golden 与易错点**（与 DeepSeek 目录结构相同），生成时须一并遵守；下列为全局摘要。**提示：** 系统还会在语言模板后再注入一段 **「豆包·任务重申」**，三处内容须一致遵守。
    - **环境变量：** 优先使用 `TEST_PLAINTEXT`、`TEST_KEY`、`TEST_IV`（及 **`TEST_AAD`** 等评测注入项）。Python 须 `import os` 后 `os.getenv(..., "").strip()` 判断；**不要**用多轮 `input("请输入…")` 阻塞评测。**AES-GCM：** AAD 必须为 **`TEST_AAD`** 或固定 **`4D23C3CEC334B49BDB370C437FEC78DE`** 解码后的**相同字节**，在 `encrypt` 前调用 **`cipher.update(aad)`**（PyCryptodome）或 EVP 侧对 AAD 的 Update；**禁止**漏 AAD 或 `input("请输入AAD")`（典型：**密文前 32 hex 对、tag 后 32 hex 错**）。nonce **12 字节**（IV 为 test_data 中 **24 hex**）。
    - **输出格式：** 必须打印 **`密文:`** 或 **`ciphertext:`** 加**完整连续 hex**（无空格）。**AES-GCM** 期望为 **密文(16B)+tag(16B)** → **64 hex**；**自测 golden：** **`F7264413A84C0E7CD536867EB9F2173667BA0510262AE487D737EE6298F77E0C`**；禁止只输出 32 hex。`cryptography`/`PyCryptodome` 须 **`encrypt_and_digest`** 或等价地 **密文与 16 字节 tag 原样拼接**再 hex。
    - **C 预处理：** **禁止** `#define 8`、`#define 8 8`、`#define 8 8 // …`、`#define 8 8 /* … */` ——宏名**不能**为纯数字（**行尾注释无论 `//` 还是 `/* */` 均无效**）。**DES** 用 **`#define DES_BLOCK_BYTES 8`**；**SM4** 用 **`#define SM4_BLOCK_BYTES 16`**。
    - **hex 解码：** `a~f` 分支须写 **`tolower(c) - 'a' + 10`**（数字 **10**），**禁止**写成 **`+ a10`**（会被当成未声明变量）。
    - **C 表达式：** 三元运算符必须写全 **`条件 ? 真分支 : 假分支`**。禁止 `(i == last) (len % 8) : 8` 这种**缺少 `?`** 的写法，否则会在 `:` 处语法错误。
    - **C 数组常量：** 十六进制必须带 **`0x`** 前缀（如 **`0xa34`**）。禁止 **`a34`** 等未声明标识符；**S 盒 / P 盒 / 置换表元素必须是整数**（如 **`6`**），**禁止** **`"6"`、`"9"`** 等**字符串字面量**（会触发 `initialization of 'int' from 'char *'` / `not computable at load time`）。**禁止**表中出现 **`NaN`**、**`INFINITY`**（C 整型初始化里 **`NaN` undeclared**）。**禁止**把 **`10`** 误打成 **`l0`**（小写 L+0）——会报 **`l0 undeclared`**。
    - **C 声明列表：** **禁止** `uint8_t a, 0x0B, 0x0C, d`；声明里只能是**标识符**，常量须放在 **`=` 右侧** 或后续赋值语句。
    - **缓冲区：** CFB/OFB/CTR 循环中 `memcpy`/下标须严格按**块长与已处理长度**计算，避免 **`stack smashing`** / **`malloc(): corrupted top size`**（越界写、多算一块、少分配）。
    - **DES：** 须有**完整 16 轮 Feistel** 与密钥扩展；禁止只做 IP/FP 或错误轮函数导致密文与标准向量不符。DES-ECB 自测：明文/密钥见 test_data 时密文须以 **`958920B1358EF1972B9EE4548DC08E8A`** 开头（整块 32 hex）。
    - **OFB（DES/AES）：** 反馈为**分组密码输出**（非 CFB 的密文反馈）；实现与 NIST/test_data 一致。
    - **DES-CFB（C）：** golden 与 **PyCryptodome** `DES.new(k, DES.MODE_CFB, iv)` 默认 **`segment_size=8`（CFB-8，按字节反馈）** 一致。**禁止**把 **`EVP_des_cfb()`**（常见为 **64 位 CFB**）当唯一实现——与 **`F70F01584ACF4D966ADC143EB240C962`** **对不上**；须 **CFB-8 手搓**或与 PyCryptodome 逐字节语义一致。
    - **DES-OFB（C / C++）：** 均须 **`OSSL_PROVIDER_load` + `EVP_des_ofb()` + `set_padding(0)` + 全量 `EncryptUpdate/Final`**，与 **PyCryptodome `MODE_OFB`** 对齐；**禁止**误用手写「OFB-8」又期望标准 golden。**golden：** **`F788B2BC5949FCBBB3962D8E99733A96`**。
    - **AES-CFB（本仓库向量 = CFB-8）：** C/C++ 须 **`EVP_aes_128_cfb8()`**（**不是** `cfb128`/`cfb64`）；Python **`segment_size=8`** 或省略。**禁止** `cfb128`/`segment_size=128`（错前缀常 **`ea0b8fb8`**）。**自测 golden：** **`EAC2DD6334E8FA07FDAB477ABA1628A93AFAAAD753B7E05CD59548A2927BDA97`**。
    - **SM4-CFB（C/C++）：** **禁止手写 SM4**（`Sbox`/`tau`/`sm4_cfb_encrypt`）；**必须** **`EVP_sm4_cfb128()`** + **`set_padding(0)`** + **Update 16B**。**错串 **`e1c289ae…`**（批量 20260519 cpp）= 手写 CFB 移位；**`27f3e626…`** = **ofb128**/**cfb** 缺 128。golden **`2754B10C806AEF23698989882D80903A`**。
    - **AES-CFB（C/C++）：** **`EVP_aes_128_cfb8()`**（**非 cfb128**）；**禁止** 手写 AES 表。**错串 **`be2d1094…`** = CFB-128/手写 AES。golden **`EAC2DD63…`**。
    - **AES-OFB（C/C++）：** **仅 `EVP_aes_128_ofb()`**；**禁止** 手写 `aes_ofb_encrypt` 与残缺三元（**`expression cannot be used as a function`**）。
    - **SM4-CBC：** **`EVP_sm4_cbc()`** + **`set_padding(0)`**；IV 全 0 时本仓库向量密文同 ECB → **`681EDF34D206965E86B3E94F536E4246`**。**禁止**与 CFB/OFB 反馈语义混用。
    - **SM4-OFB：** **`EVP_sm4_ofb128()`**（或 ECB 手搓 **R←O**）；golden **`2754B10C806AEF23698989882D80903A`**；**禁止**用密文更新寄存器（CFB 语义）。
    - **AES-CTR：** 使用 **`AES.modes.CTR`** 专用密钥/IV/明文（**不是**默认 AES 段的 32 字节明文）；错用默认向量会导致密文与 golden 完全不符。

  # 参考资源
  reference_resources: |
    **重要参考资源（可用于理解算法实现）：**
    - **OpenSSL官方源代码仓库：https://github.com/openssl/openssl.git**
    - 你可以访问并参考OpenSSL的官方实现来理解算法的正确实现方式
    - 特别是可以参考以下目录和文件：
      * DES实现：`crypto/des/` 目录下的源代码文件
        - `crypto/des/des_enc.c` - DES加密核心实现
        - `crypto/des/set_key.c` - 密钥调度实现
        - `crypto/des/des_locl.h` - DES内部定义和置换表
      * AES实现：`crypto/aes/` 目录下的源代码文件
        - `crypto/aes/aes_core.c` - AES核心实现
        - `crypto/aes/aes_locl.h` - AES内部定义和S盒
      * 各种模式实现：`crypto/modes/` 目录下的源代码文件
        - `crypto/modes/cbc128.c` - CBC模式实现
        - `crypto/modes/cfb128.c` - CFB模式实现
        - `crypto/modes/ofb128.c` - OFB模式实现
        - `crypto/modes/ctr128.c` - CTR模式实现
    - **重要：虽然可以参考OpenSSL源代码来理解算法实现，但必须将其转换为纯C/C++实现，不能直接使用OpenSSL库！**
    - **参考OpenSSL源代码时，重点关注算法的核心逻辑、置换表定义、S盒定义等，然后用自己的代码实现！**
  
  # C++特定规则（完整版）
  cpp_rules_full: |
    **绝对重要：代码必须完整，不能在语句中间截断！**
    **1. 头文件（最重要！代码必须从正确的头文件开始！）：**
      - **必须包含所有使用的类型和函数对应的头文件！**
      - **如果使用uint8_t/uint16_t/uint32_t/uint64_t，必须包含 `#include <cstdint>`！**
      - **如果使用std::cout/cin/cerr，必须包含 `#include <iostream>`！**
      - **如果使用std::string，必须包含 `#include <string>`！**
      - **如果使用std::vector，必须包含 `#include <vector>`！**
      - **如果使用std::remove_if/remove/find，必须包含 `#include <algorithm>`！**
      - **如果使用std::hex/setw/setfill，必须包含 `#include <iomanip>`！**
      - **如果使用isxdigit/toupper/tolower，必须包含 `#include <cctype>`！**
      - **每个include必须单独一行，不能连在一起！**
      - **代码必须从#include开始，不能缺少任何必要的头文件！**
    **2. 代码完整性：**
    - **绝对禁止使用占位符、TODO、FIXME或空函数体！**
      * **绝对不能有 `return plaintext; // placeholder` 这样的代码！**
      * **绝对不能有 `// Placeholder for actual encryption logic` 这样的注释！**
      * **绝对不能有 `// TODO: implement encryption` 这样的注释！**
      * **所有函数必须有完整的实现，不能只是返回输入！**
      * **加密函数必须真正执行加密算法，不能只是 `return input;` 或 `return plaintext;`！**
      * **如果输出的是明文的hex而不是密文，说明代码没有真正执行加密，这是严重错误！**
    - **所有语句必须完整，包括：**
      * 函数调用必须完整：`hexToBin(key)` 不能只有 `hexToBin`
      * 模板参数必须完整：`std::bitset<32>` 不能只有 `std::bitset<32`
      * 条件表达式必须完整：`if (ch >= 'a' && ch <= 'f')` 不能只有 `if (ch >= 'a' && ch`
      * 赋值语句必须完整：`key_bin = hexToBin(key);` 不能只有 `key_bin = hexToBin`
    - **绝对禁止：在数组定义中使用单独的字母（A, B, C, D, E, F, a, b, c, d, e, f）！**
      * **这些字母会被编译器识别为未定义的标识符，导致编译错误！**
      * **错误示例：`{8, 9, 10, 11, A, 13}` 或 `{9, 14, 15, 5, 2, 8, 12, a, 1, 10}`**
      * **正确做法：如果值确实是十六进制，必须使用 `0x` 前缀，如 `{8, 9, 10, 11, 0x0A, 13}` 或 `{9, 14, 15, 5, 2, 8, 12, 0x0A, 1, 10}`**
    - **置换表中的所有值都必须是数字（1-64），不能有任何字母！**
      * 绝对不要使用字母A, B, C, D, E, F作为数字！
      * 绝对不要将数字1写成字母l（小写L）！例如：51不能写成5l，13不能写成l3！
      * **绝对不要使用问号?加数字的格式！例如：?13, ?8, ?46 都是错误的！应该直接写成 13, 8, 46！**
      * **绝对不要使用 ? 符号在数组元素中！例如：`{4, 2, 1, 11, 10, 13, 7, 8, 15, 9, 12, 5, 6, 3, 0, 14}, ?` 是错误的！**
    - **类型名称必须完整正确！**
      * `uint32_t` 不能写成 `uint3?2_t` 或任何包含问号的格式！
      * 所有类型名称必须是完整的，不能有任何问号或特殊字符！
    - **每个include语句必须单独一行，绝对不能连在一起！**
    - **不要重复定义函数！每个函数只能定义一次！**
    - **函数调用时参数类型必须正确！**
    - **如果S盒或常量表中使用十六进制值，必须使用0x格式（如0x0A），不能直接使用字母A, B, C, D, E, F！**
    - **所有数组元素必须是数字或已定义的常量，不能是未定义的标识符！**
    - **绝对禁止：字母A后跟数字（如 A30, A48, A11, A14, A0）！**
    - **绝对禁止：数字后跟字母O（如 1O）！**
    - **绝对禁止：字母A后跟十六进制（如 A0xFFFFFFFF）！**
    - **绝对禁止：字符串前的字母A（如 A"字符串"）！**
    - **⚠️ 绝对禁止：在代码中使用中文字符替代数字！**
    - **数组定义必须完整：每个数组元素后面必须有逗号（最后一个元素除外），数组定义必须以 `};` 结尾！**
    - **所有函数必须有return语句（如果函数返回非void类型）！**
    - **生成代码后，请逐行检查代码，确保：**
      * 没有任何 `?数字` 格式（如 ?13, ?8）
      * 没有任何类型名称包含问号（如 uint3?2_t）
      * 数组元素中没有单独的 `?` 符号
      * **没有任何占位符、TODO或空函数体！**
      * **所有加密函数都有完整的实现，不是只返回输入！**
      * 代码完整且可以编译！
  
  # 代码不完整重试提示（完整版）
  incomplete_retry_full: |
    **严重警告：上次生成的代码不完整，在语句中间被截断！**
    **上次错误：{last_error}**
    **请务必生成完整的、可编译的代码！代码绝对不能在任何语句中间截断！**
    - **所有语句必须完整，包括：**
      * 函数调用必须完整：`hexToBin(key)` 不能只有 `hexToBin`
      * 模板参数必须完整：`std::bitset<32>` 不能只有 `std::bitset<32`
      * 条件表达式必须完整：`if (ch >= 'a' && ch <= 'f')` 不能只有 `if (ch >= 'a' && ch`
      * 赋值语句必须完整：`key_bin = hexToBin(key);` 不能只有 `key_bin = hexToBin`
      * **⚠️⚠️⚠️ 位运算表达式必须完整（特别重要！最常见的截断位置！）：**
        * ✅ 正确：`c[3] = c_value & 0xFF;` （完整的位与运算，包括 `& 0xFF` 和分号）
        * ❌ 错误：`c[3] = c_value & 0` （表达式在 `& 0` 后截断，缺少 `FF` 和分号！）
        * ✅ 正确：`c[0] = (c_value >> 24) & 0xFF;` （完整的右移和位与运算）
        * ❌ 错误：`c[0] = (c_value >> 24) & 0` （表达式在 `& 0` 后截断！）
        * **特别警告：`& 0xFF` 这样的表达式绝对不能截断为 `& 0`！这是最常见的截断错误！**
      * **⚠️⚠️⚠️ 复合赋值表达式必须完整（特别重要！）：**
        * ✅ 正确：`sbox_output[i / 2] |= (i % 2 == 0 ? s_value << 4 : s_value);` （完整的复合赋值和三元运算符）
        * ❌ 错误：`sbox_output[i / 2] |= (i % 2` （表达式在括号内截断，缺少完整的三元运算符或位运算！）
        * ❌ 错误：`sbox_output[i / 2] |=` （表达式在 `|=` 后截断，缺少右操作数！）
        * **所有复合赋值运算符（+=, -=, *=, /=, %=, &=, |=, ^=, <<=, >>=）必须完整，包括左操作数、运算符、完整的右操作数表达式和分号！**
        * **三元运算符（`? :`）必须完整，包括条件、问号、真值表达式、冒号和假值表达式！**
        * **特别警告：`|= (i % 2` 这样的表达式绝对不能截断！括号内的表达式必须完整！**
      * **⚠️⚠️⚠️ 函数调用必须完整（特别重要！最常见的截断位置！）：**
        * ✅ 正确：`memcpy(right, initial_permuted, 4);` （完整的函数调用，包括所有参数和闭合括号）
        * ❌ 错误：`memcpy(right, initial_perm` （函数调用在参数中间截断，缺少参数和闭合括号！）
        * ❌ 错误：`memcpy(right, initial_permuted` （函数调用缺少最后一个参数和闭合括号！）
        * ❌ 错误：`memcpy(right, initial_permuted,` （函数调用在逗号后截断，缺少最后一个参数！）
        * **所有函数调用必须完整，包括函数名、开括号、所有参数（用逗号分隔）、闭括号和分号！**
        * **特别警告：`memcpy(right, initial_perm` 这样的函数调用绝对不能截断！所有参数必须完整！**
      * **⚠️⚠️⚠️ 类型声明必须完整（特别重要！最常见的截断位置！）：**
        * ✅ 正确：`uint8_t sbox_output[4] = {0};` （完整的类型声明）
        * ❌ 错误：`uint8` （类型声明不完整，缺少 `_t` 后缀、变量名和分号！）
        * ❌ 错误：`uint8_t` （类型声明不完整，缺少变量名和分号！）
        * **所有类型声明必须完整，包括完整的类型名（如 `uint8_t`，不能只有 `uint8`）、变量名、数组大小（如果是数组）、初始化（如果有）和分号！**
        * **特别警告：`uint8` 这样的类型声明绝对不能截断！必须是完整的类型名（如 `uint8_t`）！**
      * **⚠️⚠️⚠️ 函数体必须完整（特别重要！最常见的截断位置！）：**
        * ✅ 正确：`void expansion_function(...) { ... }` （完整的函数，包括函数体、所有语句和闭合大括号）
        * ❌ 错误：函数在循环后截断，缺少闭合大括号 `}`，如 `for (...) { ... }` 后面没有 `}`
        * **所有函数必须有完整的函数体，包括函数签名、开大括号、完整的函数体、所有循环和条件语句的闭合大括号、函数闭合大括号！**
        * **特别警告：函数体绝对不能只有开大括号或只有部分语句！所有函数必须有完整的函数体和闭合大括号！**
    - **所有数组定义必须完整，包括所有元素和闭合的大括号！**
    - **所有函数必须完整实现，不能在中途截断！**
    - **绝对禁止使用占位符！所有函数必须有完整实现！**
      * **绝对不能有 `return plaintext; // placeholder` 这样的代码！**
      * **加密函数必须真正执行加密，不能只是 `return plaintext;`！**
    - **所有函数必须有return语句（如果函数返回非void类型）！**
    - **代码必须从 `#include` 开始，到 `main` 函数结束，中间不能有任何截断！**
    - **main函数必须完整，包括：**
      * 函数签名：`int main() {`
      * 完整的函数体（所有语句）
      * 闭合的大括号：`}`
      * **绝对不能只有 `int main` 而没有函数体！**
    - **每个include语句必须单独一行，绝对不能连在一起！**
    - **不要重复定义函数！每个函数只能定义一次！**
    - **函数参数名必须是有效的标识符，不能是十六进制值或数字！**
    - **函数调用时参数类型必须正确！**
    - **绝对禁止：在数组定义中使用单独的字母（A, B, C, D, E, F, a, b, c, d, e, f）！**
    - **置换表中的所有值都必须是数字（1-64），不能有任何字母！绝对不要使用字母A, B, C, D, E, F作为数字！绝对不要将数字1写成字母l（小写L）！例如：51不能写成5l，13不能写成l3！**
    - **如果S盒或常量表中使用十六进制值，必须使用0x格式（如0x0A），不能直接使用字母A, B, C, D, E, F！**
    - **所有数组元素必须是数字或已定义的常量，不能是未定义的标识符！**
    - **绝对禁止：字母A后跟数字（如 A30, A48, A11, A14, A0）！**
    - **绝对禁止：数字后跟字母O（如 1O）！**
    - **绝对禁止：字母A后跟十六进制（如 A0xFFFFFFFF）！**
    - **绝对禁止：字符串前的字母A（如 A"字符串"）！**
    - **⚠️ 绝对禁止：在代码中使用中文字符替代数字！**
    - **生成代码后，请逐行检查代码末尾，确保：**
      * 最后一行是完整的语句（以分号结尾）
      * 所有函数都有完整的函数体（包括return语句）
      * 所有括号、大括号、方括号都正确匹配和闭合
      * 代码可以编译通过，没有任何语法错误
