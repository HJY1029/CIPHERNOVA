  key/iv 各 **16B**；明文 **16B** → **32 hex** 密文；前缀 **`2754b10c`**。
  **禁止：** 空 **`des_encrypt(){}`**、**`DES_KEY_SIZE 8`、`des.h`**。

supplement: |
