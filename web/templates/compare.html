{% extends "base.html" %}

{% block title %}代码对比 - 织密新星 (CipherNova){% endblock %}

{% block content %}
<div class="container">
    <div class="header">
        <h1>⚖️ 代码对比</h1>
        <p>对比不同LLM生成的代码，查看差异和优劣</p>
    </div>
    <div class="content">
        <div id="status" class="status"></div>
        
        <div class="form-group">
            <label>选择第一个代码</label>
            <select id="compareCode1" class="form-control">
                <option value="">从历史记录选择...</option>
            </select>
        </div>
        <div class="form-group">
            <label>选择第二个代码</label>
            <select id="compareCode2" class="form-control">
                <option value="">从历史记录选择...</option>
            </select>
        </div>
        <button type="button" class="btn" onclick="compareCodes()">开始对比</button>
        <div id="compareResult" style="margin-top: 20px; display: none;"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let codeHistory = JSON.parse(localStorage.getItem('codeHistory') || '[]');

    // 更新代码对比下拉框
    function updateCompareSelects() {
        const select1 = document.getElementById('compareCode1');
        const select2 = document.getElementById('compareCode2');
        
        select1.innerHTML = '<option value="">从历史记录选择...</option>';
        select2.innerHTML = '<option value="">从历史记录选择...</option>';
        
        codeHistory.forEach((item, index) => {
            const label = `${item.algorithm} ${item.mode || ''} - ${item.language} (${new Date(item.timestamp).toLocaleString()})`;
            const option1 = new Option(label, index);
            const option2 = new Option(label, index);
            select1.add(option1);
            select2.add(option2);
        });
    }

    // 代码对比功能
    async function compareCodes() {
        const code1Id = document.getElementById('compareCode1').value;
        const code2Id = document.getElementById('compareCode2').value;
        
        if (!code1Id || !code2Id) {
            showStatus('请选择两个代码进行对比', 'error');
            return;
        }
        
        if (code1Id === code2Id) {
            showStatus('请选择不同的代码', 'error');
            return;
        }
        
        const code1 = codeHistory[parseInt(code1Id)];
        const code2 = codeHistory[parseInt(code2Id)];
        
        if (!code1 || !code2) {
            showStatus('无法找到选中的代码', 'error');
            return;
        }
        
        const resultDiv = document.getElementById('compareResult');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = '<div class="status info">正在对比代码...</div>';
        
        try {
            const code1Full = code1.code || code1.codePreview || '代码1（完整代码未保存）';
            const code2Full = code2.code || code2.codePreview || '代码2（完整代码未保存）';
            
            const analysis = generateCompareAnalysis(code1, code2, code1Full, code2Full);
            
            resultDiv.innerHTML = `
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
                    <div>
                        <h4>${code1.algorithm} ${code1.mode || ''} - ${code1.language}</h4>
                        <div style="background: #1e1e1e; border-radius: 8px; padding: 15px; max-height: 500px; overflow-y: auto; font-family: monospace; font-size: 0.9em;">
                            <pre><code class="language-${code1.language}">${escapeHtml(code1Full)}</code></pre>
                        </div>
                    </div>
                    <div>
                        <h4>${code2.algorithm} ${code2.mode || ''} - ${code2.language}</h4>
                        <div style="background: #1e1e1e; border-radius: 8px; padding: 15px; max-height: 500px; overflow-y: auto; font-family: monospace; font-size: 0.9em;">
                            <pre><code class="language-${code2.language}">${escapeHtml(code2Full)}</code></pre>
                        </div>
                    </div>
                </div>
                <div style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px;">
                    <h4>对比分析</h4>
                    <div style="line-height: 1.8;">${analysis}</div>
                </div>
            `;
            
            hljs.highlightAll();
        } catch (error) {
            resultDiv.innerHTML = `<div class="status error">对比失败: ${error.message}</div>`;
        }
    }

    function generateCompareAnalysis(code1, code2, code1Full, code2Full) {
        let analysis = '<ul style="list-style: none; padding: 0;">';
        
        if (code1.algorithm !== code2.algorithm) {
            analysis += `<li>✓ 算法不同：${code1.algorithm} vs ${code2.algorithm}</li>`;
        }
        if (code1.mode !== code2.mode) {
            analysis += `<li>✓ 模式不同：${code1.mode || '无'} vs ${code2.mode || '无'}</li>`;
        }
        if (code1.language !== code2.language) {
            analysis += `<li>✓ 编程语言不同：${code1.language} vs ${code2.language}</li>`;
        }
        const len1 = code1Full.length;
        const len2 = code2Full.length;
        if (len1 !== len2) {
            analysis += `<li>✓ 代码长度不同：${len1} 字符 vs ${len2} 字符</li>`;
        }
        if (code1.provider !== code2.provider) {
            analysis += `<li>✓ LLM提供商不同：${code1.provider} vs ${code2.provider}</li>`;
        }
        
        analysis += '</ul>';
        return analysis;
    }

    document.addEventListener('DOMContentLoaded', () => {
        updateCompareSelects();
    });
</script>
{% endblock %}
