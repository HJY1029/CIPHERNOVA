supplement: |
  SM4：**密钥与 IV 均为 128 位 = 16 字节 = 32 个十六进制字符**（与 test_data 一致）。**不是** DES，不存在「SM4 用 8 字节密钥」。若运行时中文报错 **「密钥长度必须为8字节（64位）」**，即为把 **DES 校验**写进了 SM4 程序，必须删除并改为 **32 hex → 16 字节**。
  OFB-128：寄存器 R₀=IV；每块 **O = E_K(R)**，**C = P ⊕ O**，**下一寄存器 R ← O**（反馈 **密码输出块 O**，**不是**密文 C）。与 CFB 混用会得到错误密文。
  **自测 golden（test_data / OpenSSL SM4-OFB-128）：** 明文、密钥、IV 均为 `0123456789ABCDEFFEDCBA9876543210`（各 32 hex）时，密文为 **`2754B10C806AEF23698989882D80903A`**。

c: |
  校验逻辑须写：**hex 字符串长度为 32** 表示 16 字节。**禁止**在报错中写「16 个十六进制字符 = 8 字节」——那是把 DES 规则误套到 SM4；正确表述为「SM4 密钥需 32 个 hex（16 字节）」。
  若变量名如 `TEST_KEY` 沿用 DES 的 8 字节解析，必须改为按 SM4 读满 16 字节。
  优先 **`EVP_sm4_ofb128()`**；若符号不存在，用 **`EVP_sm4_ecb()`** 在 `main` 内实现上述 OFB-128 状态机（每轮 `EncryptUpdate` 一块 16 字节），**禁止**把 OFB 反馈写成密文。

cpp: |
  与 C 相同：**`EVP_sm4_ofb128()`** 首选；不可用时 **`EVP_sm4_ecb()` + OFB-128 状态机**（R←O，非 R←C）。**必须在 Update 前** `EVP_CIPHER_CTX_set_padding(ctx, 0)`。
  **密钥解析（极高频错）：** `TEST_KEY` / hex 串须解码为 **16 字节**（**32 个 hex 字符**）。**禁止** `if (key.size() != 8)`、`密钥长度必须为8字节`、`64位`、或任何 **DES 专用**校验；若校验失败，应提示 **「SM4 密钥须 32 个 hex（16 字节）」**，不得出现 **8 字节** 要求。
  **禁止**把 DES 工程的 `hex_to_key_8`、`validateKey8Bytes`、共用 `parseKey()`（只读 16 hex）套用到 SM4；C++ 请使用 **`std::vector<uint8_t>(16)`** 或 `uint8_t key[16]` 存放解码结果再 `EVP_EncryptInit_ex`。
  输出仅 **`密文:` + 与明文等长的 hex**，不要追加 IV 或多余填充字节；自测应对齐 golden **`2754B10C806AEF23698989882D80903A`**。
  可用命令核对：`openssl enc -sm4-ofb -nopad -K <32hex密钥> -iv <32hex IV> -in plain.bin`（plain.bin 为 16 字节明文）。
