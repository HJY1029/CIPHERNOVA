# SM4|ofb：cpp 用 EVP_sm4_ofb()；python 用 gmssl one_round 手搓 OFB-128（无 crypt_ofb）
generate_pin_python: |
  **SM4|ofb|python（gmssl 无 crypt_ofb · 整文件照抄 python: 块）：**
  - **禁止** `crypt_ofb` / `encrypt_ofb` / `crypt_cfb`（`CryptSM4` 仅有 **`crypt_ecb` / `crypt_cbc`**）。
  - **OFB-128：** `R=iv` → `o=E_K(R)` via **`one_round`** → `C=P⊕o` → **`R=o`**（反馈 **密钥流块 o**，**不是**密文 C）。
  - **env：** `TEST_KEY` / `TEST_IV` / `TEST_PLAINTEXT` 各 **32 hex** → **`bytes.fromhex`**。
  - **输出：** **`print("密文:", …hex().lower())`**；golden 前缀 **`2754b10c`**。

generate_pin_cpp: |
  **SM4|ofb|cpp（唯一未过 · 禁止改骨架 · 整文件照抄 cpp: 块）：**
  - **cipher：** **`EVP_sm4_ofb()`**（**禁止 `EVP_sm4_ofb128()`** — evp.h 无此符号）。
  - **env：** 必须 **`getenv("TEST_PLAINTEXT")` + `getenv("TEST_KEY")` + `getenv("TEST_IV")`** + **strip + h2b**。
  - **禁止：** `h2b("0000000000000000",…)` 硬编码；**禁止** 只读 TEST_PLAINTEXT；**禁止 `strlen(getenv…)` 当 pt_len**。
  - **输出：** **`printf("密文: ");` + `%02x` 循环**；golden **`2754b10c`**。

