  # NIST标准测试向量 - AES-128-CTR
  # 来源: openssl/test/recipes/30-test_evp_data/evpciph_aes_common.txt
  # 这些是NIST SP800-38A标准测试向量，OpenSSL使用它们进行测试
  # 注意：CTR模式的IV在OpenSSL中通常使用16字节（128位），前12字节作为nonce，后4字节作为计数器
