cpp: |
  **【AES|gcm|cpp · 未过】照抄（禁止 iostream/RAND_bytes/strlen(env)；IV 必须来自 TEST_IV+h2b）：**
  ```cpp
  #include <stdio.h>
  #include <stdlib.h>
  #include <string.h>
  #include <ctype.h>
  #include <openssl/evp.h>
  static void strip(char*s){char*d=s;while(*s){if(!isspace((unsigned char)*s))*d++=*s;s++;}*d=0;}
  static int h2b(const char*h,unsigned char*b,int n){
    for(int i=0;i<n;i++){unsigned v;if(sscanf(h+2*i,"%2x",&v)!=1)return -1;b[i]=(unsigned char)v;}return 0;}
  int main(void){
    char *ph=getenv("TEST_PLAINTEXT"),*kh=getenv("TEST_KEY"),*ih=getenv("TEST_IV");
    char *ah=getenv("TEST_AAD"); if(!ah) ah=(char*)"4D23C3CEC334B49BDB370C437FEC78DE";
    if(!ph||!kh||!ih)return 1;
    strip(ph);strip(kh);strip(ih);strip(ah);
    if(strlen(kh)!=64||strlen(ih)!=24||strlen(ph)!=32||strlen(ah)!=32)return 1;
    unsigned char pt[16],key[32],nonce[12],aad[16],ct[16],tag[16];
    if(h2b(ph,pt,16)||h2b(kh,key,32)||h2b(ih,nonce,12)||h2b(ah,aad,16))return 1;
    EVP_CIPHER_CTX*ctx=EVP_CIPHER_CTX_new();
    if(!ctx)return 1;
    if(!EVP_EncryptInit_ex(ctx,EVP_aes_256_gcm(),NULL,NULL,NULL))return 1;
    if(!EVP_CIPHER_CTX_ctrl(ctx,EVP_CTRL_GCM_SET_IVLEN,12,NULL))return 1;
    if(!EVP_EncryptInit_ex(ctx,NULL,NULL,NULL,nonce))return 1;
    if(!EVP_EncryptInit_ex(ctx,NULL,NULL,key,NULL))return 1;
    int l=0,o1=0,o2=0;
    if(!EVP_EncryptUpdate(ctx,NULL,&l,aad,16))return 1;
    if(!EVP_EncryptUpdate(ctx,ct,&o1,pt,16))return 1;
    if(!EVP_EncryptFinal_ex(ctx,ct+o1,&o2))return 1;
    if(!EVP_CIPHER_CTX_ctrl(ctx,EVP_CTRL_GCM_GET_TAG,16,tag))return 1;
    printf("密文: ");
    for(int i=0;i<o1;i++)printf("%02x",ct[i]);
    for(int i=0;i<16;i++)printf("%02x",tag[i]);
    printf("\n");
    EVP_CIPHER_CTX_free(ctx);
    return 0;
  }
  ```

