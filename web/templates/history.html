{% extends "base.html" %}

{% block title %}历史记录 - 织密新星 (CipherNova){% endblock %}

{% block content %}
<div class="container">
    <div class="header">
        <h1>📜 历史记录</h1>
        <p>查看和管理生成的代码历史记录</p>
    </div>

    <div class="content">
        <div id="status" class="status" style="display: none;"></div>

        <div class="history-filters-panel" style="margin-bottom: 18px; padding: 16px; background: #f8f9fa; border-radius: 8px; border: 1px solid #e9ecef;">
            <div style="font-weight: 600; margin-bottom: 12px; color: #333;">筛选条件</div>
            <div style="display: flex; flex-wrap: wrap; gap: 12px 16px; align-items: center;">
                <label style="display: flex; align-items: center; gap: 6px; font-size: 0.95em;">
                    LLM
                    <select id="filterProvider" style="min-width: 170px; padding: 6px 8px; border-radius: 4px; border: 1px solid #ced4da;">
                        <option value="">全部</option>
                    </select>
                </label>
                <label style="display: flex; align-items: center; gap: 6px; font-size: 0.95em;">
                    语言
                    <select id="filterLanguage" style="min-width: 110px; padding: 6px 8px; border-radius: 4px; border: 1px solid #ced4da;">
                        <option value="">全部</option>
                    </select>
                </label>
                <label style="display: flex; align-items: center; gap: 6px; font-size: 0.95em;">
                    算法
                    <select id="filterAlgorithm" style="min-width: 120px; padding: 6px 8px; border-radius: 4px; border: 1px solid #ced4da;">
                        <option value="">全部</option>
                    </select>
                </label>
                <label style="display: flex; align-items: center; gap: 6px; font-size: 0.95em;">
                    模式
                    <select id="filterMode" style="min-width: 120px; padding: 6px 8px; border-radius: 4px; border: 1px solid #ced4da;">
                        <option value="">全部</option>
                    </select>
                </label>
                <button type="button" id="applyFilterBtn" class="btn" style="background: #0066aa; color: #fff;">应用筛选</button>
                <button type="button" id="resetFilterBtn" class="btn btn-secondary">重置</button>
            </div>
            <p id="filterActiveHint" style="margin: 10px 0 0; font-size: 0.85em; color: #0c5460; display: none;">已应用筛选，仅显示符合条件的记录</p>
        </div>

        <div style="margin-bottom: 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <button type="button" id="selectAllBtn" class="btn" style="background: #6c757d; color: white;">全选</button>
            <button type="button" id="deleteSelectedBtn" class="btn btn-secondary" style="display: none;">删除选中 (<span id="selectedCount">0</span>)</button>
            <button type="button" id="clearHistoryBtn" class="btn btn-secondary">清空历史</button>
            <button type="button" id="refreshBtn" class="btn">刷新</button>
            <button type="button" id="deleteBtn" class="btn btn-secondary">删除</button>
            <div style="margin-left: auto; color: #666;">
                共 <span id="historyCount">0</span> 条记录
            </div>
        </div>

        <div id="historyList" style="display: grid; gap: 15px;">
            <!-- 历史记录项将动态插入这里 -->
        </div>

        <div id="emptyHistory" style="text-align: center; padding: 60px 20px; color: #999; display: none;">
            <div style="font-size: 3em; margin-bottom: 20px;">📭</div>
            <div style="font-size: 1.2em; margin-bottom: 10px;">暂无历史记录</div>
            <div id="emptyHistoryHint" style="font-size: 0.9em;">返回 <a href="/" style="color: #0066aa; text-decoration: underline;">首页</a> 生成代码并保存到历史记录</div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let codeHistory = [];

    function historyFilterParams() {
        const p = new URLSearchParams();
        const prov = document.getElementById('filterProvider') && document.getElementById('filterProvider').value;
        const lang = document.getElementById('filterLanguage') && document.getElementById('filterLanguage').value;
        const alg = document.getElementById('filterAlgorithm') && document.getElementById('filterAlgorithm').value;
        const mode = document.getElementById('filterMode') && document.getElementById('filterMode').value;
        if (prov) p.set('provider', prov);
        if (lang) p.set('language', lang);
        if (alg) p.set('algorithm', alg);
        if (mode) p.set('mode', mode);
        return p;
    }

    function hasActiveFilters() {
        return [...historyFilterParams()].length > 0;
    }

    function updateFilterHint() {
        const el = document.getElementById('filterActiveHint');
        if (!el) return;
        el.style.display = hasActiveFilters() ? 'block' : 'none';
    }

    function fillSelectFromCounts(selectId, countsObj) {
        const sel = document.getElementById(selectId);
        if (!sel) return;
        const cur = sel.value;
        sel.innerHTML = '<option value="">全部</option>';
        const keys = Object.keys(countsObj || {}).sort();
        keys.forEach(k => {
            const opt = document.createElement('option');
            opt.value = k;
            opt.textContent = k + ' (' + countsObj[k] + ')';
            sel.appendChild(opt);
        });
        if ([...sel.options].some(o => o.value === cur)) sel.value = cur;
    }

    function fillModeSelectFromCounts(byMode) {
        const sel = document.getElementById('filterMode');
        if (!sel) return;
        const cur = sel.value;
        sel.innerHTML = '<option value="">全部</option>';
        const keys = Object.keys(byMode || {}).sort((a, b) => {
            if (a === '') return 1;
            if (b === '') return -1;
            return a.localeCompare(b);
        });
        keys.forEach(k => {
            const opt = document.createElement('option');
            if (k === '') {
                opt.value = '__none__';
                opt.textContent = '无模式 (' + byMode[k] + ')';
            } else {
                opt.value = k;
                opt.textContent = k + ' (' + byMode[k] + ')';
            }
            sel.appendChild(opt);
        });
        if ([...sel.options].some(o => o.value === cur)) sel.value = cur;
    }

    async function loadFilterOptionsFromStats() {
        try {
            const response = await fetch('/api/history/statistics');
            const data = await response.json();
            if (!data.success || !data.statistics) return;
            const s = data.statistics;
            fillSelectFromCounts('filterProvider', s.by_provider || {});
            fillSelectFromCounts('filterLanguage', s.by_language || {});
            fillSelectFromCounts('filterAlgorithm', s.by_algorithm || {});
            fillModeSelectFromCounts(s.by_mode || {});
        } catch (e) {
            console.warn('加载筛选选项失败', e);
        }
    }

    function resetFilters() {
        ['filterProvider', 'filterLanguage', 'filterAlgorithm', 'filterMode'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.value = '';
        });
        updateFilterHint();
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', async function() {
        await loadFilterOptionsFromStats();
        await loadHistory();
        setupEventListeners();
    });

    // 从服务端加载历史记录（支持 query 筛选）
    async function loadHistory() {
        try {
            showStatus('正在加载历史记录...', 'info');
            const p = historyFilterParams();
            const qs = p.toString();
            const url = '/api/history' + (qs ? '?' + qs : '');
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.success) {
                codeHistory = data.history || [];
                updateFilterHint();
                renderHistory();
                showStatus('历史记录加载成功', 'success');
            } else {
                showStatus('加载历史记录失败: ' + (data.error || '未知错误'), 'error');
                codeHistory = [];
                renderHistory();
            }
        } catch (error) {
            console.error('加载历史记录失败:', error);
            showStatus('加载历史记录失败: ' + error.message, 'error');
            codeHistory = [];
            renderHistory();
        }
    }

    // 设置事件监听器
    function setupEventListeners() {
        document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);
        document.getElementById('applyFilterBtn').addEventListener('click', () => loadHistory());
        document.getElementById('resetFilterBtn').addEventListener('click', async () => {
            resetFilters();
            await loadHistory();
        });
        document.getElementById('refreshBtn').addEventListener('click', async () => {
            await loadFilterOptionsFromStats();
            await loadHistory();
        });
        document.getElementById('selectAllBtn').addEventListener('click', toggleSelectAll);
        document.getElementById('deleteSelectedBtn').addEventListener('click', deleteSelected);
        document.getElementById('deleteBtn').addEventListener('click', deleteSelected);
        
        // 监听复选框变化，更新选中项样式
        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('history-item-checkbox')) {
                const historyItem = e.target.closest('.history-item');
                if (e.target.checked) {
                    historyItem.classList.add('selected');
                } else {
                    historyItem.classList.remove('selected');
                }
                updateSelectedCount();
            }
        });
    }

    // 渲染历史记录
    function renderHistory() {
        const historyList = document.getElementById('historyList');
        const emptyHistory = document.getElementById('emptyHistory');
        const historyCount = document.getElementById('historyCount');

        historyCount.textContent = codeHistory.length;

        if (codeHistory.length === 0) {
            historyList.style.display = 'none';
            emptyHistory.style.display = 'block';
            const hint = document.getElementById('emptyHistoryHint');
            if (hint) {
                hint.innerHTML = hasActiveFilters()
                    ? '当前筛选条件下没有记录，可点击「重置」后查看全部'
                    : '返回 <a href="/" style="color: #0066aa; text-decoration: underline;">首页</a> 生成代码并保存到历史记录';
            }
            return;
        }

        historyList.style.display = 'grid';
        emptyHistory.style.display = 'none';
        historyList.innerHTML = '';

        // 历史记录已经是从服务端倒序获取的（最新的在前）
        codeHistory.forEach((item, index) => {
            const historyItem = document.createElement('div');
            historyItem.className = 'history-item';
            
            // 点击整个项切换选中状态（但排除按钮和链接）
            historyItem.addEventListener('click', function(e) {
                // 如果点击的是按钮、链接或复选框本身，不处理
                if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A' || e.target.type === 'checkbox') {
                    return;
                }
                // 如果点击的是按钮或链接的父元素，也不处理
                if (e.target.closest('button') || e.target.closest('a')) {
                    return;
                }
                
                const checkbox = historyItem.querySelector('.history-item-checkbox');
                if (checkbox) {
                    checkbox.checked = !checkbox.checked;
                    checkbox.dispatchEvent(new Event('change'));
                }
            });
            
            const timestamp = new Date(item.timestamp);
            const dateStr = timestamp.toLocaleString('zh-CN');
            
            historyItem.innerHTML = `
                <input type="checkbox" class="history-item-checkbox" data-id="${item.id}" onchange="updateSelectedCount()">
                <div class="history-item-header">
                    <div class="history-item-title">${escapeHtml(item.algorithm)} ${item.mode || ''} - ${escapeHtml(item.language.toUpperCase())}</div>
                    <div class="history-item-meta">${dateStr}</div>
                </div>
                <div class="history-item-info">
                    <span>🔧 ${escapeHtml(item.provider)}</span>
                    <span>⚙️ ${escapeHtml(item.operation || '加密解密')}</span>
                    ${item.validation_success !== false ? '<span>✓ 已验证</span>' : '<span>⚠ 未验证</span>'}
                    ${item.test_success ? '<span>✓ 测试通过</span>' : ''}
                    ${item.generation_time ? `<span>⏱️ ${item.generation_time.toFixed(2)}秒</span>` : ''}
                </div>
                ${item.code_preview ? `
                <div class="history-item-code-preview">
                    ${escapeHtml(item.code_preview)}
                </div>
                ` : ''}
                <div class="history-item-actions" onclick="event.stopPropagation();">
                    <button class="btn-load" onclick="event.stopPropagation(); loadHistoryItem(${index})">加载到首页</button>
                    <button class="btn-view" onclick="event.stopPropagation(); viewHistoryItem(${index})">查看代码</button>
                    ${item.validation_success === false || item.validation_success === null ? `<button class="btn-validate" onclick="event.stopPropagation(); validateHistoryItem(${index})">进行验证</button>` : ''}
                    <button class="btn-delete" onclick="event.stopPropagation(); deleteHistoryItem(${index})">删除</button>
                </div>
            `;
            
            historyList.appendChild(historyItem);
        });
        
        // 更新选中数量显示
        updateSelectedCount();
    }

    // 加载历史记录项到首页
    function loadHistoryItem(index) {
        const item = codeHistory[index];
        if (!item) {
            showStatus('历史记录项不存在', 'error');
            return;
        }

        // 将数据存储到sessionStorage，然后跳转到首页
        sessionStorage.setItem('loadHistoryItem', JSON.stringify({
            provider: item.provider,
            algorithm: item.algorithm,
            mode: item.mode || '',
            language: item.language,
            operation: item.operation || '加密解密',
            requirements: item.requirements || '',
            enable_validation: item.validation_success !== false,
            code: item.code || item.code_preview || ''
        }));

        window.location.href = '/';
    }

    // 查看历史记录项代码
    async function viewHistoryItem(index) {
        const item = codeHistory[index];
        if (!item) {
            showStatus('历史记录项不存在', 'error');
            return;
        }

        // 如果代码不完整，尝试从服务端获取完整代码
        let code = item.code || item.code_preview || '代码未保存';
        if (!item.code && item.id) {
            try {
                const response = await fetch(`/api/history/${item.id}`);
                const data = await response.json();
                if (data.success && data.item && data.item.code) {
                    code = data.item.code;
                }
            } catch (error) {
                console.error('获取完整代码失败:', error);
            }
        }

        const language = item.language || 'python';
        const title = `${item.algorithm} ${item.mode || ''} - ${item.language.toUpperCase()}`;

        // 创建模态框
        const modal = document.createElement('div');
        modal.className = 'code-modal';
        modal.id = 'codeModal';
        modal.innerHTML = `
            <div class="code-modal-content">
                <div class="code-modal-header">
                    <h3>${escapeHtml(title)}</h3>
                    <button class="code-modal-close" onclick="closeCodeModal()">关闭</button>
                </div>
                <div class="code-modal-body">
                    <pre><code class="language-${language}">${escapeHtml(code)}</code></pre>
                </div>
            </div>
        `;

        document.body.appendChild(modal);
        modal.style.display = 'block';

        // 高亮代码
        if (typeof hljs !== 'undefined') {
            const codeElement = modal.querySelector('code');
            hljs.highlightElement(codeElement);
        }

        // 点击背景关闭
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeCodeModal();
            }
        });
    }

    // 关闭代码模态框
    function closeCodeModal() {
        const modal = document.getElementById('codeModal');
        if (modal) {
            modal.remove();
        }
    }

    // 验证历史记录项
    async function validateHistoryItem(index) {
        const item = codeHistory[index];
        if (!item || !item.id) {
            showStatus('历史记录项无效', 'error');
            return;
        }

        // 找到按钮元素
        const historyItem = document.querySelectorAll('.history-item')[index];
        const validateBtn = historyItem ? historyItem.querySelector('.btn-validate') : null;
        const originalText = validateBtn ? validateBtn.textContent : '';
        
        if (validateBtn) {
            validateBtn.disabled = true;
            validateBtn.textContent = '验证中...';
        }
        showStatus('正在验证代码...', 'info');

        try {
            const response = await fetch(`/api/validate-history/${item.id}`, {
                method: 'POST'
            });
            const data = await response.json();
            
            if (data.success) {
                // 更新本地历史记录
                item.validation_success = data.validation_success;
                
                // 重新渲染历史记录
                renderHistory();
                
                if (data.validation_success) {
                    showStatus('✓ 验证通过: ' + (data.message || '代码可以正常编译/运行'), 'success');
                } else {
                    showStatus('✗ 验证失败: ' + (data.message || '代码无法编译/运行'), 'error');
                }
            } else {
                showStatus('验证失败: ' + (data.error || '未知错误'), 'error');
                if (validateBtn) {
                    validateBtn.disabled = false;
                    validateBtn.textContent = originalText;
                }
            }
        } catch (error) {
            console.error('验证历史记录失败:', error);
            showStatus('验证失败: ' + error.message, 'error');
            if (validateBtn) {
                validateBtn.disabled = false;
                validateBtn.textContent = originalText;
            }
        }
    }

    // 删除历史记录项（删除后按当前筛选重新拉取列表）
    async function deleteHistoryItem(index) {
        if (!confirm('确定要删除这条历史记录吗？')) {
            return;
        }

        const item = codeHistory[index];
        if (!item || !item.id) {
            showStatus('历史记录项无效', 'error');
            return;
        }

        try {
            const response = await fetch(`/api/history/${item.id}`, {
                method: 'DELETE'
            });
            const data = await response.json();
            
            if (data.success) {
                showStatus('已删除', 'success');
                await loadHistory();
            } else {
                showStatus('删除失败: ' + (data.error || '未知错误'), 'error');
            }
        } catch (error) {
            console.error('删除历史记录失败:', error);
            showStatus('删除失败: ' + error.message, 'error');
        }
    }

    // 全选/取消全选
    function toggleSelectAll() {
        const checkboxes = document.querySelectorAll('.history-item-checkbox');
        const selectAllBtn = document.getElementById('selectAllBtn');
        const allChecked = Array.from(checkboxes).every(cb => cb.checked);
        
        checkboxes.forEach(cb => {
            cb.checked = !allChecked;
            const historyItem = cb.closest('.history-item');
            if (cb.checked) {
                historyItem.classList.add('selected');
            } else {
                historyItem.classList.remove('selected');
            }
        });
        
        selectAllBtn.textContent = allChecked ? '全选' : '取消全选';
        updateSelectedCount();
    }

    // 更新选中数量
    function updateSelectedCount() {
        const checkboxes = document.querySelectorAll('.history-item-checkbox:checked');
        const selectedCount = checkboxes.length;
        const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
        const selectedCountSpan = document.getElementById('selectedCount');
        
        selectedCountSpan.textContent = selectedCount;
        
        if (selectedCount > 0) {
            deleteSelectedBtn.style.display = 'inline-block';
        } else {
            deleteSelectedBtn.style.display = 'none';
        }
    }

    // 删除选中的历史记录
    async function deleteSelected() {
        const checkboxes = document.querySelectorAll('.history-item-checkbox:checked');
        const selectedIds = Array.from(checkboxes).map(cb => cb.dataset.id);
        
        if (selectedIds.length === 0) {
            showStatus('请先选择要删除的记录', 'error');
            return;
        }
        
        if (!confirm(`确定要删除选中的 ${selectedIds.length} 条历史记录吗？`)) {
            return;
        }
        
        showStatus('正在删除...', 'info');
        
        try {
            // 批量删除
            const deletePromises = selectedIds.map(id => 
                fetch(`/api/history/${id}`, { method: 'DELETE' })
                    .then(res => res.json())
            );
            
            const results = await Promise.all(deletePromises);
            const successCount = results.filter(r => r.success).length;
            const failCount = results.length - successCount;
            
            if (failCount === 0) {
                showStatus(`已成功删除 ${successCount} 条记录`, 'success');
                // 重新加载历史记录
                await loadHistory();
            } else {
                showStatus(`删除了 ${successCount} 条记录，${failCount} 条删除失败`, 'error');
                // 仍然重新加载，显示最新状态
                await loadHistory();
            }
        } catch (error) {
            console.error('批量删除失败:', error);
            showStatus('批量删除失败: ' + error.message, 'error');
        }
    }

    // 清空历史（并刷新筛选项与列表）
    async function clearHistory() {
        if (!confirm('确定要清空所有历史记录吗？此操作不可恢复！')) {
            return;
        }

        try {
            const response = await fetch('/api/history', {
                method: 'DELETE'
            });
            const data = await response.json();
            
            if (data.success) {
                codeHistory = [];
                await loadFilterOptionsFromStats();
                await loadHistory();
                showStatus(data.message || '历史记录已清空', 'success');
            } else {
                showStatus('清空失败: ' + (data.error || '未知错误'), 'error');
            }
        } catch (error) {
            console.error('清空历史记录失败:', error);
            showStatus('清空失败: ' + error.message, 'error');
        }
    }

    // HTML转义
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 显示状态消息
    function showStatus(message, type) {
        const statusDiv = document.getElementById('status');
        statusDiv.textContent = message;
        statusDiv.className = 'status ' + type;
        statusDiv.style.display = 'block';
        
        if (type === 'success' || type === 'info') {
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 3000);
        }
    }
</script>
{% endblock %}
