# 通用关键要求
key_requirements: |
  关键要求（非常重要）：
  1. **绝对禁止使用占位符、TODO、FIXME或空函数体！**
     - **绝对不能有 `return plaintext; // placeholder` 这样的代码！**
     - **绝对不能有 `// Placeholder for actual encryption logic` 这样的注释！**
     - **绝对不能有 `// Placeholder for the encryption process` 这样的注释！**
     - **绝对不能有 `// This should include all the rounds of DES encryption` 这样的注释！**
     - **绝对不能有 `// TODO: implement encryption` 这样的注释！**
     - **所有函数必须有完整的实现，不能只是返回输入！**
     - **加密函数必须真正执行加密算法，不能只是 `return input;` 或 `return plaintext;`！**
     - **代码必须真正执行加密/解密操作，不能只输出输入数据的hex表示！**
     - **如果输出的是明文的hex而不是密文，说明代码没有真正执行加密，这是严重错误！**
     - **严重警告：绝对不能只有IP置换和FP置换！**
       * **IP置换和FP置换是互逆的，如果中间没有16轮Feistel网络，输出就是明文本身！**
       * **必须实现完整的16轮Feistel网络，包括密钥调度、扩展置换、S盒替换、P置换等！**
  2. **绝对禁止硬编码示例文本或测试数据！**
     - **绝对不能有 `std::string plaintext = "Your plaintext here";` 这样的硬编码！**
     - **绝对不能有 `std::string key = "Your key here";` 这样的硬编码！**
     - **绝对不能有 `std::string plaintext = "example";` 或任何硬编码的字符串！**
     - **必须从环境变量读取输入：**
       - Python: `os.environ.get('TEST_PLAINTEXT')` 和 `os.environ.get('TEST_KEY')`
       - C/C++: `std::getenv("TEST_PLAINTEXT")` 和 `std::getenv("TEST_KEY")`
     - **如果环境变量不存在，可以从stdin读取，但绝对不能硬编码示例文本！**
     - **代码必须能够处理任意输入，而不仅仅是特定的测试数据！**
  3. **绝对禁止使用随机数！**
     - **绝对不要使用 `rand()`、`random()`、`srand()`、`time()` 等函数生成随机IV或随机密钥！**
     - **绝对不要使用 `os.urandom()`、`random.randint()`、`secrets.token_bytes()` 等Python随机函数！**
     - 对于需要IV的模式（CBC、CFB、OFB等），**必须从环境变量TEST_IV读取固定的IV**，确保相同输入每次产生相同输出
     - 如果环境变量TEST_IV不存在，可以使用全零字节作为默认IV，但**绝对不能使用随机IV！**
     - 密钥必须从环境变量TEST_KEY读取，**绝对不能使用随机密钥！**
     - **代码必须是确定性的：相同的明文、密钥、IV必须产生完全相同的密文！**
  4. **输出格式要求（绝对重要）：**
     - **输出必须是十六进制格式的密文，不能是明文文本！**
     - **绝对不能输出 "Your plaintext here"、"example" 或任何示例文本！**
     - **输出格式：`密文: xxxxxx` 或 `ciphertext: xxxxxx`，其中xxxxxx是十六进制字符串**
     - **十六进制字符串必须：**
       * 所有字符小写（a-f, 0-9）
       * 没有空格、换行或其他分隔符
       * 长度正确（对于DES-ECB，密文长度应该是8字节的倍数，即16的倍数个hex字符）
     - **示例正确输出：`密文: 958920b1358ef1972b9ee4548dc08e8a`**
     - **示例错误输出：`Ciphertext: Your plaintext here`（这是明文，不是密文！）**
  5. 密文输出必须完整，不要截断或只输出部分内容
  6. 输出密文时，要明确标注'密文'或'ciphertext'等关键词，格式如：'密文: xxxxxx' 或 'ciphertext: xxxxxx'
  7. **绝对不要输出IV（初始化向量）！**IV只用于加密过程，不应该出现在输出中
  8. **绝对不要输出密钥！**密钥只用于加密过程，不应该出现在输出中
  9. **只输出密文本身**，不要输出IV、密钥、明文或其他任何附加信息
  10. **验证要求：生成的代码必须能够产生与预期密文完全匹配的结果！**
      - 如果实际输出是明文的hex或明文文本，说明代码没有执行加密，必须修复！
      - 如果实际输出与预期不匹配，说明加密算法实现有误，必须修复！

# 通用输出要求
output_requirements: |
  输出格式要求：
  - 输出格式必须包含'密文'或'ciphertext'关键词，例如：`print("密文:", hex_string)` 或 `printf("密文: %s\n", hex_string)`
  - 代码必须能够处理完整的输入数据，不能只处理部分数据
  - 代码执行时间应该在合理范围内（几秒内完成），不能有死循环或无限等待

# 通用结尾
ending: |
  重要：只输出纯代码，不要使用markdown代码块标记（如```python、```c、```cpp等），不要输出任何说明文字、介绍或解释，只输出代码本身！
