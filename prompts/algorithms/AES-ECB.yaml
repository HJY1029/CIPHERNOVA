# AES-ECB模式特定prompt
# 注意：AES算法的共同内容已提取到 prompts/algorithms/AES/common.yaml
# C和C++语言特定的内容已分离到 prompts/algorithms/c/AES-ECB.yaml 和 prompts/algorithms/cpp/AES-ECB.yaml
# prompt_loader.py会自动加载这些内容

algorithm_specific: |
  **AES-ECB模式说明：**
  - ECB（Electronic Codebook）模式是最简单的分组密码模式
  - 每个明文块独立加密，不依赖其他块
  - 不需要初始化向量（IV）
  - 对于AES，每个块大小为16字节（128位）
  - AES支持128位、192位、256位密钥长度
  
  **实现要求：**
  - 对于Python：使用 `cryptography` 或 `pycryptodome` 库的 `AES.MODE_ECB`
  - 对于C/C++：**🚨🚨🚨 必须优先使用OpenSSL库！🚨🚨🚨**
    - ✅ **必须使用OpenSSL EVP接口：`EVP_EncryptInit_ex()`、`EVP_EncryptUpdate()`、`EVP_EncryptFinal_ex()`**
    - ✅ **必须使用 `EVP_aes_128_ecb()`、`EVP_aes_192_ecb()` 或 `EVP_aes_256_ecb()` 获取AES-ECB密码对象（根据密钥长度选择）**
    - ❌ **绝对不要实现完整的AES算法（密钥扩展、S盒替换、轮函数等）！**
    - ❌ **绝对不要使用纯C/C++实现！代码会太长，一定会截断！只有在OpenSSL完全不可用时才使用纯实现！**
    - ❌ **绝对禁止使用占位符、TODO、FIXME、注释掉的代码或空函数体！**
  - **🚨🚨🚨 必须输出密文！🚨🚨🚨**
    - **必须使用 `printf("密文: ");` 或 `std::cout << "密文: ";` 输出密文！**
    - **必须输出完整的密文，不要截断！**
    - **重要：只输出实际加密的数据长度（使用 `ciphertext_len`），不要输出整个缓冲区！**
    - **绝对不能没有输出！程序必须输出密文！**

mode_specific: |
  **ECB模式实现细节（必须严格遵循）：**
  
  **注意：C和C++语言特定的实现要求已分离到以下文件：**
  - `prompts/algorithms/c/AES-ECB.yaml` - C语言特定内容
  - `prompts/algorithms/cpp/AES-ECB.yaml` - C++语言特定内容
  - prompt_loader.py会自动根据语言加载对应的内容
  
  **通用实现要求：**
  - **密钥长度检测：**根据密钥字节长度选择对应的EVP函数
    - 16字节（128位）→ `EVP_aes_128_ecb()`
    - 24字节（192位）→ `EVP_aes_192_ecb()`
    - 32字节（256位）→ `EVP_aes_256_ecb()`
  - **ECB模式不需要IV：**`EVP_EncryptInit_ex()` 的IV参数应设为NULL
  - **PKCS#7填充：**OpenSSL EVP会自动处理填充
