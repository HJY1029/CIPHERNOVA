c: |
  **【DES|cbc|c】照抄骨架（cipher=`EVP_des_cbc()`）：**
  ```c
  #include <stdio.h>
  #include <stdlib.h>
  #include <string.h>
  #include <ctype.h>
  #include <openssl/evp.h>
  #include <openssl/provider.h>
  static void strip(char*s){char*d=s;while(*s){if(!isspace((unsigned char)*s))*d++=*s;s++;}*d=0;}
  static int h2b(const char*h,unsigned char*b,int n){
    for(int i=0;i<n;i++){unsigned v;if(sscanf(h+2*i,"%2x",&v)!=1)return -1;b[i]=(unsigned char)v;}return 0;}
  int main(void){
    OSSL_PROVIDER_load(NULL,"legacy");
    char *ph=getenv("TEST_PLAINTEXT"),*kh=getenv("TEST_KEY"),*ih=getenv("TEST_IV");
    if(!ph||!kh||!ih)return 1;strip(ph);strip(kh);strip(ih);
    int pl=strlen(ph)/2;
    unsigned char pt[64],key[8],iv[8],out[64];
    if(strlen(kh)!=16||strlen(ih)!=16||h2b(ph,pt,pl)||h2b(kh,key,8)||h2b(ih,iv,8))return 1;
    EVP_CIPHER_CTX*ctx=EVP_CIPHER_CTX_new();
    EVP_EncryptInit_ex(ctx,EVP_des_cbc(),NULL,key,iv);
    EVP_CIPHER_CTX_set_padding(ctx,0);
    int o1=0,o2=0;EVP_EncryptUpdate(ctx,out,&o1,pt,pl);EVP_EncryptFinal_ex(ctx,out+o1,&o2);
    printf("密文: ");for(int i=0;i<o1+o2;i++)printf("%02x",out[i]);printf("\n");
    EVP_CIPHER_CTX_free(ctx);return 0;}
  ```

