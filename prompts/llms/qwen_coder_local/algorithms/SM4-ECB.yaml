# 未过槽：SM4|ecb|c、SM4|ecb|cpp（cpp=VPR）
mandatory: |
  **SM4-ECB only**：**`EVP_sm4_ecb()`** + **`set_padding(0)`**；**Init 的 iv 参数必须为 NULL**。
  key **16B**（**32 hex**）；明文 **16B** → **32 hex**；前缀 **`681edf34`**。
  **禁止：** **`des.h`、`KEY_SIZE 8`、误传 iv**。

supplement: |
  **ECB 与 CBC golden 前缀相同**（本向量）；勿把 ECB 写成 CBC。

c: |
  **【SM4|ecb|c】照抄骨架（iv=NULL）：**
  ```c
  #include <stdio.h>
  #include <stdlib.h>
  #include <string.h>
  #include <ctype.h>
  #include <openssl/evp.h>
  static void strip(char*s){char*d=s;while(*s){if(!isspace((unsigned char)*s))*d++=*s;s++;}*d=0;}
  static int h2b(const char*h,unsigned char*b,int n){
    for(int i=0;i<n;i++){unsigned v;if(sscanf(h+2*i,"%2x",&v)!=1)return -1;b[i]=(unsigned char)v;}return 0;}
  int main(void){
    char *ph=getenv("TEST_PLAINTEXT"),*kh=getenv("TEST_KEY");
    if(!ph||!kh)return 1;
    strip(ph);strip(kh);
    if(strlen(ph)!=32||strlen(kh)!=32)return 1;
    unsigned char pt[16],key[16],out[16];
    if(h2b(ph,pt,16)||h2b(kh,key,16))return 1;
    EVP_CIPHER_CTX*ctx=EVP_CIPHER_CTX_new();
    if(!ctx)return 1;
    if(!EVP_EncryptInit_ex(ctx,EVP_sm4_ecb(),NULL,key,NULL))return 1;
    EVP_CIPHER_CTX_set_padding(ctx,0);
    int o1=0,o2=0;
    if(!EVP_EncryptUpdate(ctx,out,&o1,pt,16))return 1;
    if(!EVP_EncryptFinal_ex(ctx,out+o1,&o2))return 1;
    printf("密文: ");
    for(int i=0;i<o1+o2;i++)printf("%02x",out[i]);
    printf("\n");
    EVP_CIPHER_CTX_free(ctx);
    return 0;
  }
  ```

