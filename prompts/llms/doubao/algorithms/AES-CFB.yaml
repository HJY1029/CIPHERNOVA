# 豆包 · AES-128-CFB-8（与 test_data / PyCryptodome 默认一致）
mandatory: |
  **CFB-8 only**：C/C++ → **`EVP_aes_128_cfb8()`**；Python → **`segment_size=8`** 或省略。
  **禁止** `EVP_aes_128_cfb128()`、手写整页 **AES S盒/KeyExpansion**、**`MODE_OFB`**、**`des.h`**。
  golden 前缀 **`eac2dd63`**；**`be2d1094…`** / **`ea0b8fb8…`** = CFB-128/OFB/手写 AES，立即改 **cfb8**。

supplement: |
  AES-128-CFB-8：密钥/IV 各 **16 字节**；明文 **32 字节** → 密文 **64 hex**。
  **自测 golden：** **`EAC2DD6334E8FA07FDAB477ABA1628A93AFAAAD753B7E05CD59548A2927BDA97`**。
  **批量 aes-cfb-cpp 错串 `be2d10949b30d8a…`：** 典型为手写 AES + 错误 CFB 段长，**禁止**；须 **≤90 行 EVP-only**。

python: |
  **`AES.new(key, AES.MODE_CFB, iv=iv, segment_size=8)`** 或省略 `segment_size`（**禁止** `128`、`MODE_OFB`）。
  **`print("密文:", ct.hex().lower())`**（前缀 **`eac2dd63`**）。

c: |
  **`EVP_aes_128_cfb8()`** + **`set_padding(0)`**；**禁止** `cfb128`/`des.h`。
  一次 **Update(全长明文)** + **Final**；**`printf("密文: ");`** + 连续 hex。

cpp: |
  **【批量 20260519】禁止 `static const uint8_t sbox[256]`、`KeyExpansion`、`aes_cfb_encrypt` 等手写 AES——仅允许 EVP。**
  **`EVP_aes_128_cfb8()`** + **`set_padding(0)`**；**`std::getenv("TEST_*")`**。
  ```cpp
  EVP_CIPHER_CTX *ctx = EVP_CIPHER_CTX_new();
  EVP_EncryptInit_ex(ctx, EVP_aes_128_cfb8(), NULL, key, iv);
  EVP_CIPHER_CTX_set_padding(ctx, 0);
  unsigned char out[64]; int outl=0, fin=0;
  EVP_EncryptUpdate(ctx, out, &outl, pt, pt_len);
  EVP_EncryptFinal_ex(ctx, out+outl, &fin);
  ```
  **`printf("密文: ");`** 小写连续 **64 hex**（**`eac2dd63…`**）；三元须 **`? :`** 成对。

