# OpenAI特定prompt配置
# 使用简化版prompt（compact），因为OpenAI的上下文限制较小

llm_specific:
  compact: true  # OpenAI使用简化版prompt

  # 批量评测高频失败（DES 仅置换、回显明文 hex、OpenSSL 头文件缺失、交互 input 等）— 保持简短以利 128k 上下文
  coder_bootstrap: |
    **【OpenAI / GPT · 批量评测必守】**
    - **任务补充：** `prompts/llms/openai/algorithms/<算法-模式>.yaml` 含自测 golden 与易错点，须一并遵守。
    - **输入：** 优先 `TEST_PLAINTEXT`、`TEST_KEY`、`TEST_IV`、**`TEST_AAD`**（Python/C 均 `getenv`/`os.getenv`）。**禁止**向 **stdout** 打印 **`请输入明文`/`请输入密钥`** 等再 `input`（评测从 stdout 抽 hex，多行提示会导致**无法提取密文**或抽错）。若必须提示，用 **`sys.stderr.write`** 或省略。
    - **输出：** **`密文:` 后必须紧接仅含 0-9a-f 的 hex**，然后换行；**绝对禁止**在 `密文:` 与 hex 之间插入**任何**中文/英文说明句、题面摘录或评测报错全文（会把评测抽 hex 打挂 → **无法提取密文**）。**正确：** 先 `printf("密文: ");` 再**仅** `%02x` 循环。
    - **API：** 若接口返回 **403**、正文含 **`主账户可用余额不足`** / **`可用余额为`** / **`请充值后再使用`**，属**账号计费/预冻结失败**，须**充值或换 Key**；与算法 prompt 无关，**改 YAML 不能消除**，勿误判为「模板失效」。
    - **正确性：** **明文回显：** **`4e6574776f726b205365637572697479`**。**DES-ECB：** **`ciphertext_len`/`ciphertext` 在 `for` 前未声明**（→ 编译错）；**仅 16 hex** **`4e6574776f726b20`** 或半块/全 **0** → 须 **32 hex**。**DES-CBC/OFB：** 密文 **等于整段明文 hex** = **未加密/未 XOR**。**DES-CFB：** **整行**「**请确保代码输出包含**…」→ **无法提取**；**全 0**；**`4f64…`**。**DES-OFB：** 错 **`b176e893…`**。**AES-ECB：** **`Cipher(...,w)` 少 `Nr`**（**`too few arguments`**）、**`Expanded Key:`**、以 **`57696c6c69616d53…`** 当密文 → **须删手搓、仅用 EVP**。**AES-CBC：** **`43727970…`** 书名 ASCII hex、**无 stdout**。**AES-CFB：** **`13001c1e…`** 乱串、**`des_cfb_encrypt`**。**AES-OFB Python：** 正确 OFB 前缀为 **`ea0b8fb8`**（与 PyCryptodome **`MODE_OFB`** 一致）；若以 **`eac2dd63`** 起多为误用 **CFB**。**AES-OFB · C（手搓）：** **`MixColumns` 假实现**（非 **GF(2^8)** 矩阵）+ **错 `Rcon`** → **`01300cd3…`**；**`s_box[256]={};` 仅注释省略**、**`key_expansion`/`aes_encrypt_block` 空壳** → **`a3929990…`**；密文 **`00000000…` 长零前缀** 多为 **`Rcon` 误为 `0x01..0x0a` 递增**、**块输出未写入 `outputBlock` 却 `memcpy`、或 `malloc` 后未 `hex_to_bytes`**；**仅 IV 移位、从不 `AES_encrypt`** → **`13001c1e…`**。**AES-OFB · C/C++：** **`encryptBlock`/`AES_encrypt`：`input[i]^key[i%16]`** → **`4469707269676944…`**（两语言可相同）；**内层 `feedback[j]=block[j]`** 逐字节改寄存器错；**`IV XOR key` 冒充 keystream** → 密文 hex 前半像 **ASCII**（如 **`44697072…`**）；**`EncryptBlock` 空实现** / **`ciphertext[i]=plaintext[i]`** → 密文 hex **等于明文 ASCII 的 hex**（如 **`43727970746f677261706879…`**）；**C++ 假 keystream `feedback[j]^key_[j%…]`** → **`447e617f…`**；**OFB-8**（`memmove(feedback)` + 仅 XOR **首字节** keystream）→ **`48e26113…`** ≠ **`EA0B8FB8…`**（须 **OFB-128 或 EVP**）。**AES-OFB · C：** **`AES_encrypt_block` 仅注释空体** → **`42737871…`**；**`main` 写死教材向量 + 64B 英文句**、不读 **`TEST_*`** → **密文长度与 golden 不符**。**串题 DES：** **`EVP_des_ofb`/`key[8]`/`IP`/`S_BOX`** + **注释掉加密**、打印 **未初始化密文** → **`60f89201…`**。**SM4-OFB · C：** **`main` 内二次声明 `ciphertext_len`**（→ **`redefinition`**）；**`key_expansion` 误用加密轮 `L` 代替密钥扩展 `L′`**；**轮函数 `τ` 的输入含错字（`X[i]^…` 或 `L(τ^rk)` 顺序错）** → **`c16511f3…`**；**`main` 不写 hex 解码**（**`实现略`**）→ **`f3e61722…`**；**`T(rotate_left(...))` 假密钥扩展** + **轮写成 `X[0]^T(...)` 缺 `L`** + **OFB-8** → **`fbd9bf9d…`**；**`K[i%4]` 乱写的密钥扩展** + **OFB-8 逐字节** + **默认 env 0123…** → **`7b78ecc8…`**；**`sm4_encrypt(feedback, feedback, rk)` 就地覆盖**；**无 `main` / `undefined reference to main`**、**`Sbox[16][16]`**。**SM4-OFB · C++：** **每字节 `sm4_round` 且 `feedback=block`**（或单层 `plaintext.size()` 循环）→ **`053e…`/`e5ba…`**；须 **每 16B 一次块加密**。**SM4-CFB：** **`undefined reference to hex_to_bytes`**、**`f49fff51…`**。**AES-ECB 链接：** **`hex_to_bytes`/`bytes_to_hex`** 须在 **`main` 前实现**→ 防 **`undefined reference`**。**AES-CBC 编译：** **`xtime`/`ciphertext_len` 顺序** 见算法 YAML；**手搓 AES 禁止**，**`EVP_aes_128_cbc`。** **严禁 DES 校验套 AES/SM4：** 运行时若 stderr 含 **`key must be exactly 8 bytes (16 hex chars) for DES`**、**`key must be exactly 8 bytes (16 hex chars)`**、**`Key must be 8 bytes (16 hex)`**、**`错误：DES密钥必须为8字节（16个十六进制字符）`**、**`错误：DES密钥长度必须为8字节（64位）`**、或任意 **「DES」+「8 字节」** / **「十六进制字符」** 描述 **本任务密钥** = **误拷 DES**。本仓库 **AES-128 / SM4** 的 **`TEST_KEY`** = **32 hex → 16 字节**，**只能**校验 **`!= 16` 字节**时退出，**禁止**校验 **`== 8`**、**禁止** **`fprintf`/`perror` 字符串内出现 `for DES`**（AES 任务绝无 DES）。
    - **C · 语法（OpenAI 高频编译错）：** **禁止** `strcmp(a,b) is 0`（须 **`strcmp(a,b)==0`**）；**禁止**条件里写 **`and`/`or`**（Python），须 **`&&`/`||`**（例：**`(c >= 'A' && c <= 'F')`**）。**禁止** **`the unsigned char`**、**`the std::vector<...>&`**（漏写 **`const`**，→ **`'the' has not been declared`**，SM4-OFB-C++ 批量已踩坑）。文件**末尾禁止**截断：**`for (size_t i = 0; i <`**、**未闭合的复合赋值**、**`mix_columns`/`mul2`**；**题未要求手写时一律 `EVP_*`，禁止半成品**。
    - **C · `main` 内变量（批量日志高频）：** **同一 `main` 花括号内禁止**第二次声明 **`int len`**、**`int ciphertext_len`**、**`unsigned char ciphertext[...]`**（GCC **`redeclaration` / `redefinition`**）。第二段 **`EVP_EncryptUpdate`/`Final`** 须**复用**首次声明的变量，或改用 **`int outl`** / **`block_len`**，**勿再写 `int len = 0`**。**禁止** 自拟 **`_aicrypto_ct_buf`** / **`_aicrypto_*`** 又与 **`unsigned char *ciphertext`** / **`uint8_t ciphertext[]`** **同名重复声明**（AES/SM4-OFB 批量 **`redeclaration`/`conflicting types`**）。
    - **AES/SM4（防串题）：** **AES/SM4 任务禁止**生成 **`IP[64]`/`FP[64]`/`S_BOX`** 等 **DES** 置换表或 Feistel 演示（日志中 AES-CFB 曾整文件写成 DES）。**AES** 仅用 **`EVP_aes_128_*`**；**SM4** 用 **`EVP_sm4_*`**。
    - **C · 无输出：** 评测报「程序执行成功但没有产生任何输出」= **stdout 未出现**含 **`密文`/`ciphertext`** 的行；**禁止**所有成功路径在 **`printf("密文:")`** 前 `return`；**必须** `fflush(stdout)`。
    - **C：** `#define` 须合法标识符，**禁止** `#define 8`、`#define 8 8`。**`hex_to_bytes`/`bytes_to_hex`/`printf_hex`/`remove_whitespace`** 等须在 **`main` 首次调用前**写 **`static` 完整函数体**（→ **`implicit declaration` / `undefined reference`**）。**`remove_whitespace(char *s)`** 常见：原地 `while` 跳过空白或压缩，**禁止** `main` 里调用却整文件无定义（批量 **`undefined reference to remove_whitespace`**，如 AES-OFB-C）。**`main`：** **在任何** `for (i=0;i<ciphertext_len;i++)` / **`printf("%02x", ciphertext[i])`** 之前，必须先 **`int len = 0, ciphertext_len = 0;`** + **密文缓冲** + **`EVP_EncryptUpdate`/`Final`**；**禁止** **`ciphertext_len` undeclared**。**`memcpy`/`feistel`：** 禁止截断。
    - **AES（C/C++）· OpenAI 批量：`EVP_aes_128_*` 为唯一主路径（可用 OpenSSL）。** **禁止** 生成 **玩具 AES**：**`static const unsigned char sbox[256]` + `AES_encrypt` 单字节查表**、**`for(i<16)` 仅 XOR key** 等 —— **与标准向量永远不一致**。**手搓 KeyExpansion 常见错：** **`Rcon`** 写成 **`0x01,0x02,0x03…` 连续递增**（非 AES 标准）→ OFB 密文如 **`34e704ac…`** 而非 **`EA0B8FB8…`**。**C++：** **`aes_encrypt` 内 `output=input` / Placeholder** → **`13001c1e…`**（未加密）。**禁止** **`MixColumns`/`xtime`** 手搓主线（除非题目明文要求纯算法）。**禁止** 调用 **`hex_to_bytes`/`bytes_to_hex`** 而无实现。**禁止** `unsigned char i, 0x0A, ...`。
    - **SM4-OFB（手写若不得已）：** **禁止**在 **逐字节**循环里 **每字节** `memcpy(feedback, keystream, 16)`；须 **每 16B 明文块** 只更新一次 feedback（见算法 YAML）。**SM4-CFB：** **`CK[32]`** 禁止 **`0x88...`** 省略，否则 **`too many decimal points`**。
    - **C · `CHAR_BIT` / 位旋转：** 若宏或内联里用 **`CHAR_BIT`**，必须 **`#include <limits.h>`**；或改用 **`(unsigned)(sizeof(value) * 8u - 1u)`** 作掩码，避免 **`CHAR_BIT` undeclared**（AES-GCM 等高频）。
    - **SM4 常量表（C）：** `CK`/`FK`/`S` 等数组**每个元素必须是完整 `0x` 十六进制字面量**；**绝对禁止** `0x88...`、`…`、`// 省略` 等占位，否则 **`too many decimal points`** / 括号不配平。`rotate_left`/`rol`/`hex_to_bytes` 须在 **`L_key`/`main` 首次调用前**定义，或先写 **`static unsigned int rotate_left(...);`** 等与实现完全一致的原型。
    - **C++：** `main` 与所有 `for`/`if` **大括号配平**；`EVP_CIPHER_CTX_free(ctx)` **仅一次**。**DES C++：** 禁止默认使用 `DES_key_schedule` / `DES_ecb_encrypt`（需 `openssl/des.h`+legacy，易缺头编译失败）；**请用 `EVP_des_ecb` / `EVP_des_ofb` + `<openssl/evp.h>`**。
    - **密钥长度（防拷 DES 模板）：** **AES-128 / SM4** 的 **`TEST_KEY`**（及需 IV 的 AES 模式之 **`TEST_IV`**）均为 **32 hex → 16 字节**。**推荐**不显式写「8 字节」分支：**解码后 `key_len==16` 则 `EVP_aes_128_*` / `EVP_sm4_*`，否则 `fprintf` 写「expect 32 hex for 128-bit key」**。**绝对禁止**源码中出现：**`if (key_len != 8)`**、**`must be 8 bytes`**、**`16 hex chars)`** 与 **密钥错误** 绑在一起（除非文件**整份**是 DES 任务）。**绝对禁止** **`错误：DES密钥长度必须为8字节`**、**`错误：DES密钥必须为8字节（16个十六进制字符）`**、**英文 `... for DES`** 出现在 **AES/SM4** 生成代码中。
    - **收尾：** 代码**禁止**在 `feistel_function(r`、未闭合 `(` 处结束；**禁止** `getchar()`/`scanf` 阻塞导致「无输出」。`main` 须 **`printf("密文: ");` … `fflush(stdout);`** 再 `return`。
    - **EVP_*：** `#include <openssl/evp.h>`，`EVP_CIPHER_CTX *ctx = EVP_CIPHER_CTX_new();`，**禁止**未声明就用 `ctx`。**每次** `EVP_EncryptUpdate`/`Final` 须检查返回值，用返回的 **`len` 累加** `ciphertext_len`，**禁止**未 Update 就打印导致 **全 `0` 或与明文 hex 相同**。**AES-CFB：** 与 ECB 相同须完整 Init/Update/Final；全零密文多为长度未累加或未写入缓冲。**AES-GCM：** nonce 多为 **12 字节**（24 hex），**禁止**强制校验「IV 必须 16 字节」导致运行失败。
    - **AES-GCM：** 输出 **密文∥tag = 64 hex**；**先** `cipher.update(aad)`（AAD hex **`4D23C3CEC334B49BDB370C437FEC78DE`** 或 `TEST_AAD`），再加密；密文对、tag 错 = AAD 未参与。
    - **AES-CTR（Python）：** 仅用 **`AES.modes.CTR`** 段：**key 32 hex、IV 32 hex（16B）、明文 128 hex（64B）**，golden 以 **`874D6191…`** 开头。**禁止**只把 IV 前 8 字节当 **`nonce`** 且不配 **`initial_value`**（常见误生成 **`67ee0554…`**）。**推荐** `from Crypto.Util.Counter import Counter` → **`Counter.new(128, initial_value=int.from_bytes(iv_bytes, 'big'))`** → **`AES.new(key, AES.MODE_CTR, counter=ctr)`**；或等价地让 **16B IV 整体**作为与 **OpenSSL `EVP_aes_128_ctr`** 一致的 **128 位计数器初值（大端）**。
    - **SM4：** 密钥/IV **32 hex**；CFB/OFB 用 **`EVP_sm4_cfb128` / `EVP_sm4_ofb128`**（或 ECB 手搓 OFB 状态机）；golden 密文见各任务 YAML。

  # 参考资源
  reference_resources: |
    **重要参考资源：**
    - **OpenSSL：** https://github.com/openssl/openssl
    - **本仓库批量评测（C/C++）：允许且推荐使用 OpenSSL 3 `EVP_*` API**：`#include <openssl/evp.h>`，对称加密用 **`EVP_EncryptInit_ex` / `EVP_EncryptUpdate` / `EVP_EncryptFinal_ex`**，算法选取 **`EVP_aes_128_*` / `EVP_sm4_*` / `EVP_des_*`**；链接 **`-lcrypto`**（评测器会先 `gcc …`，失败再尝试 **`-lssl -lcrypto`**）。
    - **禁止**为「不用库」而手写 **半套 AES/SM4**（仅 S 盒、错误 OFB/CFB 反馈）—— 此类代码 **无法对齐标准向量**。
    - 仅在题目**明确要求「纯算法、禁用密码库」**时才考虑完整手写；**默认一律 EVP**。
  
  # C++特定规则（简化版）
  cpp_rules_compact: |
    **C++代码规则（严格遵循）：**
    **1. 头文件（最重要！代码必须从正确的头文件开始！）：**
      - **必须包含所有使用的类型和函数对应的头文件！**
      - **如果使用uint8_t/uint16_t/uint32_t/uint64_t，必须包含 `#include <cstdint>`！**
      - **如果使用std::cout/cin/cerr，必须包含 `#include <iostream>`！**
      - **如果使用std::string，必须包含 `#include <string>`！**
      - **如果使用std::vector，必须包含 `#include <vector>`！**
      - **如果使用std::remove_if/remove/find，必须包含 `#include <algorithm>`！**
      - **如果使用std::hex/setw/setfill，必须包含 `#include <iomanip>`！**
      - **如果使用isxdigit/toupper/tolower，必须包含 `#include <cctype>`！**
      - **每个include必须单独一行，不能连在一起！**
      - **代码必须从#include开始，不能缺少任何必要的头文件！**
    **2. 代码完整性：**
    - 代码必须完整，不能截断
    - **绝对禁止使用占位符、TODO、FIXME或空函数体！**
      - **绝对不能有 `return plaintext; // placeholder` 这样的代码！**
      - **绝对不能有 `// Placeholder for DES encryption logic` 这样的注释！**
      - **绝对不能有 `// Placeholder for actual encryption logic` 这样的注释！**
      - **绝对不能有 `// Placeholder for the encryption process` 这样的注释！**
      - **绝对不能有 `// Placeholder for Feistel function (f)` 这样的注释！**
      - **绝对不能有 `// Placeholder for key schedule and subkeys generation` 这样的注释！**
      - **绝对不能有 `// This should include all the rounds of DES encryption` 这样的注释！**
      - **绝对不能有 `std::vector<uint64_t> subkeys(16, 0); // Placeholder subkeys` 这样的代码！**
      - **绝对不能有被注释掉的代码，如 `// right = left XOR f(right, subkeys[i]);`！**
      - **所有函数必须有完整的实现，不能只是返回输入！**
      - **加密函数必须真正执行加密算法，不能只是 `return input;`！**
    - **严重警告：对于DES算法，绝对不能只有IP置换和FP置换！**
      - **IP置换和FP置换是互逆的，如果中间没有16轮Feistel网络，输出就是明文本身！**
      - **必须实现完整的16轮Feistel网络，包括密钥调度、扩展置换、S盒替换、P置换等！**
      - **绝对不能只有 `permute(plaintext, IP_TABLE, 64)` 然后直接 `permute(permuted_block, FP_TABLE, 64)`！**
      - **绝对禁止在16轮循环中只有注释，必须有实际的代码实现！**
      - **错误示例（绝对禁止）：**
        ```cpp
        for (int i = 0; i < 16; ++i) {
            // Placeholder for DES round logic
        }
        ```
      - **正确做法：必须在循环中实现完整的Feistel网络逻辑，包括E置换、S盒替换、P置换等！**
    - 禁止在数组中使用单独字母（A-F），使用0x前缀表示十六进制
    - 禁止?数字格式，直接使用数字
    - 禁止类型名包含问号（如uint3?2_t）
    - 不要重复定义函数
    - **函数参数名必须是有效的标识符（如a, b, key等），不能是十六进制值（如0x0A）或数字！**
    - **函数参数类型必须正确（数组指针vs整数）！**
      - **严重错误：`permute(right, 0x0E, 48)` - 第二个参数不能是整数0x0E！**
      - **正确做法：`permute(right, E_TABLE, 48)` - 第二个参数必须是数组名（如E_TABLE）！**
      - **permute函数的第二个参数必须是已定义的置换表数组名，不能是整数或十六进制值！**
      - **常见的置换表数组名：E_TABLE（扩展置换）、P_TABLE（P盒置换）、IP_TABLE（初始置换）、FP_TABLE（最终置换）、PC1_TABLE、PC2_TABLE等**
    - 禁止字母A后跟数字（如A30→30）
    - 禁止中文字符替代数字
    - 数组定义必须完整（以};结尾）
    - 所有函数必须有return语句（非void）
  
  # 代码不完整重试提示（简化版）
  incomplete_retry_compact: |
    **警告：上次代码不完整被截断！**
    {last_error}
    **请生成完整的、可编译的代码！**
    - 代码必须从#include开始，到main函数结束
    - 所有语句、函数、数组定义必须完整
    - 所有括号、大括号必须正确匹配
    - **绝对禁止使用占位符！所有函数必须有完整实现！**
    - **加密函数必须真正执行加密，不能只是 `return plaintext;`！**
    - **代码绝对不能截断！main函数必须完整，包括函数体和大括号！**
    - **⚠️⚠️⚠️ 位运算表达式必须完整（特别重要！最常见的截断位置！）：**
      - ✅ 正确：`c[3] = c_value & 0xFF;` （完整的位与运算）
      - ❌ 错误：`c[3] = c_value & 0` （表达式在 `& 0` 后截断，缺少 `FF` 和分号！）
      - ✅ 正确：`c[0] = (c_value >> 24) & 0xFF;` （完整的右移和位与运算）
      - ❌ 错误：`c[0] = (c_value >> 24) & 0` （表达式在 `& 0` 后截断！）
      - **特别警告：`& 0xFF` 这样的表达式绝对不能截断为 `& 0`！这是最常见的截断错误！**
    - **⚠️⚠️⚠️ 复合赋值表达式必须完整（特别重要！）：**
      - ✅ 正确：`sbox_output[i / 2] |= (i % 2 == 0 ? s_value << 4 : s_value);` （完整的复合赋值和三元运算符）
      - ❌ 错误：`col |= ((input[(i *` （**常见 AES 手搓截断**，→ `expected expression at end of input`）
      - ❌ 错误：`if (c >= 'A' and c <= 'F')` （**Python `and`** → C 须 **`&&`**）
      - ❌ 错误：`while (*hex and num_bytes < max)` （同上，须 **`&&`**）
      - ❌ 错误：`hex_to_bytes`/`bytes_to_hex` **仅调用、无同文件 `static` 实现**（→ **`implicit declaration` + `undefined reference to hex_to_bytes`/`bytes_to_hex`**）
      - ❌ 错误：`MixColumns` 内先调用 **`xtime`**、函数定义写在后面（→ **`implicit declaration of 'xtime'`** / **`conflicting types for 'xtime'`**）；**本题须删手搓、仅用 `EVP_aes_128_*`**
      - ❌ 错误：`for (i=0;i<ciphertext_len;i++)` 出现在 **`int ciphertext_len`** 声明之前（→ **`ciphertext_len` undeclared**）
      - ❌ 错误：在 **AES-128 / SM4** 代码里写 **`if (key_len != 8)`**、**`... for DES`**、**`key must be exactly 8 bytes (16 hex chars) for DES`**、**`错误：DES密钥必须为8字节（16个十六进制字符）`**、**`Key must be 8 bytes (16 hex)`**（→ 须 **`key_len==16` / 32 hex**）
      - ❌ 错误：**AES-CFB** 调用 **`des_cfb_encrypt`**（→ **`undefined reference`**）；须 **`EVP_aes_128_cfb128`**
      - ❌ 错误：**AES-ECB** 打印 **`Expanded Key:`** / **教材键扩展 hex** 充当密文（须 **`EVP_aes_128_ecb` + 单行 `密文:`**）
      - ❌ 错误：**AES-ECB** **`Cipher(in,out,w)`** 少第四参 **`Nr`**（→ **`too few arguments to 'Cipher'`**）；须 **删 `Cipher`、用 `EVP_aes_128_ecb`**
      - ❌ 错误：**stdout** 在 **`密文:`** 后输出**整句说明文**而非 hex（→ **无法提取**；须**仅** `密文:`+hex）
      - ❌ 错误：`the unsigned char *p` / **`the std::vector<uint32_t>& rk`**（→ **`'the' has not been declared`**，须写 **`const std::vector<...>&`**）
      - ❌ 错误：`for (size_t i = 0; i <` （**for 头截断**，→ `expected expression at end of input`）
      - ❌ 错误：`sbox_output[i / 2] |= (i % 2` （表达式在括号内截断，缺少完整的三元运算符或位运算！）
      - ❌ 错误：`sbox_output[i / 2] |=` （表达式在 `|=` 后截断，缺少右操作数！）
      - **所有复合赋值运算符（+=, -=, *=, /=, %=, &=, |=, ^=, <<=, >>=）必须完整，包括左操作数、运算符、完整的右操作数表达式和分号！**
      - **三元运算符（`? :`）必须完整，包括条件、问号、真值表达式、冒号和假值表达式！**
      - **特别警告：`|= (i % 2` 这样的表达式绝对不能截断！括号内的表达式必须完整！**
    - **⚠️⚠️⚠️ 函数调用必须完整（特别重要！最常见的截断位置！）：**
      - ✅ 正确：`memcpy(right, initial_permuted, 4);` （完整的函数调用，包括所有参数和闭合括号）
      - ❌ 错误：`memcpy(right, initial_perm` （函数调用在参数中间截断，缺少参数和闭合括号！）
      - ❌ 错误：`memcpy(right, initial_permuted` （函数调用缺少最后一个参数和闭合括号！）
      - ❌ 错误：`memcpy(right, initial_permuted,` （函数调用在逗号后截断，缺少最后一个参数！）
      - **所有函数调用必须完整，包括函数名、开括号、所有参数（用逗号分隔）、闭括号和分号！**
      - **特别警告：`memcpy(right, initial_perm` 这样的函数调用绝对不能截断！所有参数必须完整！**
    - **⚠️⚠️⚠️ 类型声明必须完整（特别重要！最常见的截断位置！）：**
      - ✅ 正确：`uint8_t sbox_output[4] = {0};` （完整的类型声明）
      - ❌ 错误：`uint8` （类型声明不完整，缺少 `_t` 后缀、变量名和分号！）
      - ❌ 错误：`uint8_t` （类型声明不完整，缺少变量名和分号！）
      - **所有类型声明必须完整，包括完整的类型名（如 `uint8_t`，不能只有 `uint8`）、变量名、数组大小（如果是数组）、初始化（如果有）和分号！**
      - **特别警告：`uint8` 这样的类型声明绝对不能截断！必须是完整的类型名（如 `uint8_t`）！**
    - **⚠️⚠️⚠️ 函数体必须完整（特别重要！最常见的截断位置！）：**
      - ✅ 正确：`void expansion_function(...) { ... }` （完整的函数，包括函数体、所有语句和闭合大括号）
      - ❌ 错误：函数在循环后截断，缺少闭合大括号 `}`，如 `for (...) { ... }` 后面没有 `}`
      - **所有函数必须有完整的函数体，包括函数签名、开大括号、完整的函数体、所有循环和条件语句的闭合大括号、函数闭合大括号！**
      - **特别警告：函数体绝对不能只有开大括号或只有部分语句！所有函数必须有完整的函数体和闭合大括号！**
    - **函数调用时参数类型必须正确：**
      - **permute函数的第二个参数必须是数组名（如E_TABLE），不能是整数（如0x0E）！**
      - **错误：`permute(right, 0x0E, 48)` - 0x0E是整数，不是数组！**
      - **正确：`permute(right, E_TABLE, 48)` - E_TABLE是已定义的数组！**
