supplement: |
  AES-128-ECB：密钥 **32 hex → 16 字节**，明文 **64 hex → 32 字节**，密文 **64 hex**。无 IV。`EVP_CIPHER_CTX_set_padding(ctx, 0)`（本测例为整块无填充，与 PyCryptodome `AES.new(..., MODE_ECB).encrypt(plain)` 一致）。
  **本题不是 DES：** 密钥须 **32 hex**；**禁止**「密钥长度必须为 8 字节」「DES key must be 8 bytes」、`uint8_t key[8]` 解析 `TEST_KEY`。
  **自测 golden（test_data）：** **`DB727AC6624F3699CBFC4F0F890832B8A4B1DCA1F52EF8E4CE0FD12E307476C6`**。

c: |
  **禁止**用长度 16 或更小的数组存放解码后的 **32 字节明文**；hex 串 64 字符需要 **至少 32 字节** 明文缓冲 + 终止符若用 C 字符串另算。
  常见报错「数据过长」「十六进制转换失败」来自：`char pt[16]` 却写入 32 字节、或 sscanf 循环次数按错、或把 hex 长度当成字节长度。
  ECB 路径**不要**读 IV；hex 解码函数应对 **偶数长度** 校验，密钥区与明区分开分配。
  若用 `uint8_t key[16], pt[32], ct[32]` 等，与 test_data 长度严格一致后再调 EVP。
  使用 **`EVP_aes_128_ecb()`**，**禁止** `EVP_des_*`；密钥解析函数必须接受 **len==32** 的 hex，**禁止**复用只解码 16 hex 的 DES 密钥工具。
  用户可见错误信息须写 **AES/SM4 语义**（如「AES-128 密钥须 32 个 hex」），**禁止**出现「DES key」或「DES 密钥」。
