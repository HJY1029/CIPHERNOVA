# SM4-ECB模式特定prompt
# 注意：C和C++语言特定的内容已分离到 prompts/algorithms/c/SM4-ECB.yaml 和 prompts/algorithms/cpp/SM4-ECB.yaml
# prompt_loader.py会自动加载这些内容

algorithm_specific: |
  **SM4-ECB模式说明：**
  - ECB（Electronic Codebook）模式是最简单的分组密码模式
  - 每个明文块独立加密，不依赖其他块
  - 不需要初始化向量（IV）
  - 对于SM4，每个块大小为16字节（128位）
  - SM4密钥必须为16字节（128位）
  
  **实现要求：**
  - 对于Python：使用 `gmssl` 库的 `sm4.CryptSM4()`、`set_key(key, sm4.SM4_ENCRYPT)` 与 **`crypt_ecb(plaintext)`**（**不是** `encrypt_ecb`）
  - 对于C/C++：**如果OpenSSL支持SM4，使用OpenSSL库！**
    - ✅ **必须使用OpenSSL EVP接口：`EVP_EncryptInit_ex()`、`EVP_EncryptUpdate()`、`EVP_EncryptFinal_ex()`**
    - ✅ **必须使用 `EVP_sm4_ecb()` 获取SM4-ECB密码对象**
    - ❌ **绝对不要实现完整的SM4算法！**
    - ❌ **绝对禁止使用占位符、TODO、FIXME、注释掉的代码或空函数体！**
  - **🚨🚨🚨 必须输出密文！🚨🚨🚨**
    - **必须使用 `print("密文: ")` 或 `printf("密文: ");` 或 `std::cout << "密文: ";` 输出密文！**
    - **必须输出完整的密文，不要截断！**
    - **重要：只输出实际加密的数据长度，不要输出整个缓冲区或IV！**

mode_specific: |
  **ECB模式实现细节（必须严格遵循）：**
  
  **注意：C和C++语言特定的实现要求已分离到以下文件：**
  - `prompts/algorithms/c/SM4-ECB.yaml` - C语言特定内容
  - `prompts/algorithms/cpp/SM4-ECB.yaml` - C++语言特定内容
  - prompt_loader.py会自动根据语言加载对应的内容
  
  **Python实现要求（使用gmssl库）：**
  1. **必须导入库：**
     - `from gmssl import sm4`
     - `import binascii`
  
  2. **必须使用gmssl库函数：**
     - ✅ **正确：使用 `sm4.CryptSM4()` 创建SM4对象**
     - ✅ **正确：使用 `set_key()` 设置密钥**
     - ✅ **正确：使用 `crypt_ecb(plaintext)` 进行ECB模式加密（PKCS7 由库处理）**
  
  3. **main函数必须完整实现：**
     - 从环境变量读取明文和密钥（TEST_PLAINTEXT, TEST_KEY）
     - 将十六进制字符串转换为字节数组
     - 使用gmssl库进行SM4-ECB加密
     - 输出密文（十六进制格式）
     - 返回0
  
  **通用实现要求：**
  - **密钥长度：**SM4密钥必须为16字节（128位）
  - **块大小：**SM4块大小为16字节（128位）
  - **ECB模式：**不需要IV
  - **PKCS#7填充：**OpenSSL EVP会自动处理填充
