  gcm:
    plaintext: "F56E87055BC32D0EEB31B2EACC2BF2A5"
    key: "EEBC1F57487F51921C0465665F8AE6D1658BB26DE6F8A069A3520293A572078F"  # AES-256 (32 bytes)
    iv: "99AA3E68ED8173A0EED06684"  # 12 bytes nonce
    aad: "4D23C3CEC334B49BDB370C437FEC78DE"  # 附加认证数据
    ciphertext: "F7264413A84C0E7CD536867EB9F21736"
    tag: "67BA0510262AE487D737EE6298F77E0C"
    # 完整输出: ciphertext + tag
    expected_output: "F7264413A84C0E7CD536867EB9F2173667BA0510262AE487D737EE6298F77E0C"
