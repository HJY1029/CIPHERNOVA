  cbc:
    plaintext: "6BC1BEE22E409F96E93D7E117393172A"
    key: "2B7E151628AED2A6ABF7158809CF4F3C"
    iv: "000102030405060708090A0B0C0D0E0F"
    ciphertext: "7649ABAC8119B246CEE98E9B12E9197D"
